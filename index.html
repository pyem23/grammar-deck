v style=\"font-size:25px;line-height:1.7;font-weight:600;\">a <span style=\"background:#E7E8FB;color:#4B4FB0;padding:2px 7px;border-radius:5px;\">beautiful</span> <span style=\"background:#E7E8FB;color:#4B4FB0;padding:2px 7px;border-radius:5px;\">small</span> <span style=\"background:#E7E8FB;color:#4B4FB0;padding:2px 7px;border-radius:5px;\">old</span> <span style=\"background:#E7E8FB;color:#4B4FB0;padding:2px 7px;border-radius:5px;\">round</span> <span style=\"background:#FBE3E1;color:#B23A30;padding:2px 7px;border-radius:5px;font-weight:700;\">table</span></div>\n          <div style=\"font-size:21px;color:#7A746A;margin-top:6px;\">Opinion → Size → Age → Shape → <strong>Noun</strong></div>\n        </div>\n        <div style=\"background:#FCEEEC;border-radius:14px;padding:14px 22px;border-left:6px solid #B23A30;\">\n          <div style=\"font-size:24px;font-weight:800;color:#B23A30;margin-bottom:2px;\">✗ SALAH</div>\n          <div style=\"font-size:24px;color:#7F2A22;\">\"a round old small beautiful table\" → urutan acak terdengar janggal.</div>\n        </div>\n      </div>\n    </div>\n    <details style=\"background:#EAF6EC;border:2px dashed #8FBF98;border-radius:14px;padding:14px 24px;\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n        <span style=\"font-size:24px;font-weight:700;color:#2F6B3D;\"><span style=\"font-family:'Caveat',cursive;font-size:32px;\">Coba Yuk!</span> &nbsp;Urutkan: \"Italian / a / leather / nice / bag\"</span>\n        <span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:24px;padding:9px 18px;border-radius:8px;white-space:nowrap;\">Lihat Jawaban →</span>\n      </summary>\n      <div style=\"margin-top:10px;font-size:24px;line-height:1.5;color:#2C3A2F;\">\"a <strong>nice</strong> (opinion) <strong>Italian</strong> (origin) <strong>leather</strong> (material) <strong>bag</strong>.\" → Opinion → Origin → Material → Noun.</div>\n    </details>\n  </div>"},{"label":"Clause","html":"<div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"></div>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"></div>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:18px;\">\n    <div>\n      <span style=\"display:inline-block;background:#C9971A;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">TOPIK 06 · CLAUSE</span>\n      <div style=\"display:flex;align-items:baseline;gap:18px;margin-top:10px;\"><h2 style=\"font-size:52px;font-weight:800;margin:0;\">Clause</h2><span style=\"font-family:'Caveat',cursive;font-size:38px;color:#C9971A;\">anak &amp; induk kalimat</span></div>\n    </div>\n    <div style=\"display:grid;grid-template-columns:1.05fr 1fr;gap:26px;flex:1;min-height:0;\">\n      <div style=\"display:flex;flex-direction:column;gap:16px;\">\n        <div style=\"background:#fff;border-top:5px solid #C9971A;border-radius:14px;padding:20px 24px;box-shadow:0 6px 18px rgba(60,55,45,0.08);\">\n          <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#C9971A;margin-bottom:8px;\">APA ITU CLAUSE?</div>\n          <p style=\"font-size:25px;line-height:1.45;margin:0;color:#3D3A33;\"><strong>Clause</strong> (klausa) = kelompok kata yang <strong>sudah punya subjek + kata kerja</strong>. Inilah beda utamanya dengan phrase.</p>\n        </div>\n        <div style=\"background:#fff;border:1px solid #ECE6D8;border-radius:14px;padding:18px 24px;box-shadow:0 6px 18px rgba(60,55,45,0.08);\">\n          <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#7A746A;margin-bottom:8px;\">FUNGSINYA DI KALIMAT</div>\n          <p style=\"font-size:24px;line-height:1.45;margin:0;color:#3D3A33;\">Setiap klausa menyampaikan <strong>satu kejadian / satu ide</strong>. Kalimat dibangun dari satu atau beberapa klausa yang digabung.</p>\n        </div>\n        <details style=\"background:#FFF3BF;border-radius:10px;padding:16px 22px;box-shadow:0 6px 16px rgba(60,55,45,0.12);\">\n          <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;\">\n            <span style=\"font-size:24px;color:#5C4A1E;line-height:1.3;\"><span style=\"font-family:'Caveat',cursive;font-size:32px;color:#9A6B12;\">Cara Cepat:</span> diawali <strong>kata hubung</strong>? Itu <strong>Dependent</strong>.</span>\n            <span class=\"rv-btn\" style=\"flex:none;background:#9A6B12;color:#fff;font-weight:800;font-size:22px;padding:7px 14px;border-radius:8px;white-space:nowrap;\">contoh ▾</span>\n          </summary>\n          <div style=\"margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px;\">\n            <div style=\"background:#fff;border-radius:8px;padding:8px 12px;\"><div style=\"font-size:22px;font-weight:800;color:#9A6B12;\">Keterangan waktu</div><div style=\"font-size:22px;color:#5C4A1E;\">when, while, after, before</div></div>\n            <div style=\"background:#fff;border-radius:8px;padding:8px 12px;\"><div style=\"font-size:22px;font-weight:800;color:#9A6B12;\">Sebab–akibat</div><div style=\"font-size:22px;color:#5C4A1E;\">because, since, as, so that</div></div>\n            <div style=\"background:#fff;border-radius:8px;padding:8px 12px;\"><div style=\"font-size:22px;font-weight:800;color:#9A6B12;\">Syarat (condition)</div><div style=\"font-size:22px;color:#5C4A1E;\">if, unless, as long as</div></div>\n            <div style=\"background:#fff;border-radius:8px;padding:8px 12px;\"><div style=\"font-size:22px;font-weight:800;color:#9A6B12;\">Relative pronoun</div><div style=\"font-size:22px;color:#5C4A1E;\">who, which, that, whose</div></div>\n          </div>\n        </details>\n      </div>\n      <div style=\"display:flex;flex-direction:column;gap:14px;\">\n        <div style=\"background:#DCEAF6;border-radius:12px;padding:16px 20px;border-left:6px solid #2A66A8;\">\n          <div style=\"font-size:24px;font-weight:800;color:#2A66A8;\">Independent Clause (induk)</div>\n          <div style=\"font-size:24px;color:#274660;line-height:1.4;margin-top:3px;\">Lengkap (S+V) &amp; maknanya utuh → <strong>bisa berdiri sendiri</strong> jadi kalimat.</div>\n          <div style=\"font-size:24px;font-weight:700;background:#fff;color:#2A66A8;border-radius:8px;padding:8px 12px;margin-top:8px;\">\"She joined the grammar club.\"</div>\n        </div>\n        <div style=\"background:#FBE3E1;border-radius:12px;padding:16px 20px;border-left:6px solid #B23A30;\">\n          <div style=\"font-size:24px;font-weight:800;color:#B23A30;\">Dependent Clause (anak)</div>\n          <div style=\"font-size:24px;color:#5C4A40;line-height:1.4;margin-top:3px;\">Diawali kata hubung → maknanya menggantung, <strong>butuh induk kalimat</strong>.</div>\n          <div style=\"font-size:24px;font-weight:700;background:#fff;color:#B23A30;border-radius:8px;padding:8px 12px;margin-top:8px;\">\"Because she wanted to improve…\"</div>\n        </div>\n        <div style=\"background:#33302A;border-radius:12px;padding:16px 20px;color:#FBF7EE;\">\n          <div style=\"font-size:22px;font-weight:800;letter-spacing:1px;color:#C9B8A0;margin-bottom:8px;\">GABUNGAN 2 KLAUSA → 1 KALIMAT</div>\n          <div style=\"font-size:24px;line-height:1.5;\"><span style=\"background:#FBE3E1;color:#B23A30;padding:1px 6px;border-radius:4px;font-weight:700;\">Because she wanted to improve</span> <span style=\"font-size:20px;color:#E0A39C;\">(DC)</span>, <span style=\"background:#DCEAF6;color:#2A66A8;padding:1px 6px;border-radius:4px;font-weight:700;\">she joined the club</span> <span style=\"font-size:20px;color:#9CC4E8;\">(IC)</span>.</div>\n          <div style=\"font-size:22px;line-height:1.4;margin-top:8px;color:#D9D2C4;\">Anak kalimat (DC) menempel pada induk (IC). DC sendiri maknanya menggantung; setelah digabung induk, barulah menjadi <strong style=\"color:#fff;\">kalimat utuh</strong>.</div>\n        </div>\n      </div>\n    </div>\n    <details style=\"background:#EAF6EC;border:2px dashed #8FBF98;border-radius:14px;padding:14px 24px;\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n        <span style=\"font-size:24px;font-weight:700;color:#2F6B3D;\"><span style=\"font-family:'Caveat',cursive;font-size:32px;\">Coba Yuk!</span> &nbsp;Tandai klausa: \"If you study hard, you will pass the exam.\"</span>\n        <span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:24px;padding:9px 18px;border-radius:8px;white-space:nowrap;\">Lihat Jawaban →</span>\n      </summary>\n      <div style=\"margin-top:10px;font-size:24px;line-height:1.5;color:#2C3A2F;\">Dependent: <strong>If you study hard</strong> · Independent: <strong>you will pass the exam</strong>.</div>\n    </details>\n  </div>"},{"label":"Sentence","html":"<div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"></div>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"></div>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:16px;\">\n    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;\">\n      <div>\n        <span style=\"display:inline-block;background:#4FA15B;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">TOPIK 07 · SENTENCE</span>\n        <div style=\"display:flex;align-items:baseline;gap:18px;margin-top:10px;\"><h2 style=\"font-size:52px;font-weight:800;margin:0;\">Sentence</h2><span style=\"font-family:'Caveat',cursive;font-size:38px;color:#4FA15B;\">empat tipe kalimat</span></div>\n      </div>\n      <div style=\"display:flex;gap:12px;\">\n        <div style=\"background:#DCEAF6;border-radius:10px;padding:10px 16px;text-align:center;\"><div style=\"font-size:26px;font-weight:800;color:#2A66A8;\">IC</div><div style=\"font-size:20px;color:#3B6FA0;\">Independent Clause<br>= klausa lengkap, berdiri sendiri</div></div>\n        <div style=\"background:#FBE3E1;border-radius:10px;padding:10px 16px;text-align:center;\"><div style=\"font-size:26px;font-weight:800;color:#B23A30;\">DC</div><div style=\"font-size:20px;color:#9A4A42;\">Dependent Clause<br>= anak kalimat, butuh induk</div></div>\n      </div>\n    </div>\n    <div style=\"background:#fff;border-top:5px solid #4FA15B;border-radius:14px;padding:16px 24px;box-shadow:0 6px 18px rgba(60,55,45,0.08);\">\n      <p style=\"font-size:24px;line-height:1.4;margin:0;color:#3D3A33;\"><strong>Sentence</strong> = gabungan satu/lebih <strong>clause</strong> jadi ide lengkap. Tipenya ditentukan oleh <strong>jumlah &amp; jenis klausa</strong>. <span style=\"font-family:'Caveat',cursive;font-size:30px;color:#9A6B12;\">&nbsp;Cara cepat: hitung klausanya!</span></p>\n    </div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;flex:1;min-height:0;\">\n      <div style=\"background:#DDF0E1;border-radius:14px;padding:18px 22px;display:flex;flex-direction:column;\">\n        <div style=\"display:flex;align-items:center;gap:10px;\"><span style=\"font-size:25px;font-weight:800;color:#357A47;\">SIMPLE</span><span style=\"background:#357A47;color:#fff;font-size:20px;font-weight:700;padding:3px 10px;border-radius:14px;\">1 IC</span></div>\n        <div style=\"font-size:24px;color:#2C5C39;margin-top:6px;\">Satu klausa lengkap saja.</div>\n        <div style=\"margin-top:auto;background:#fff;border-radius:8px;padding:10px 14px;font-size:24px;color:#3D3A33;\">\"<span style=\"color:#357A47;font-weight:700;\">I study English.</span>\"</div>\n      </div>\n      <div style=\"background:#DCEAF6;border-radius:14px;padding:18px 22px;display:flex;flex-direction:column;\">\n        <div style=\"display:flex;align-items:center;gap:10px;\"><span style=\"font-size:25px;font-weight:800;color:#2A66A8;\">COMPOUND</span><span style=\"background:#2A66A8;color:#fff;font-size:20px;font-weight:700;padding:3px 10px;border-radius:14px;\">IC + IC</span></div>\n        <div style=\"font-size:24px;color:#1F4E80;margin-top:6px;\">Dua IC disambung FANBOYS (and, but…).</div>\n        <div style=\"margin-top:auto;background:#fff;border-radius:8px;padding:10px 14px;font-size:24px;color:#3D3A33;\">\"<span style=\"color:#2A66A8;font-weight:700;\">I study,</span> and <span style=\"color:#2A66A8;font-weight:700;\">she reads.</span>\"</div>\n      </div>\n      <div style=\"background:#FBF0D6;border-radius:14px;padding:18px 22px;display:flex;flex-direction:column;\">\n        <div style=\"display:flex;align-items:center;gap:10px;\"><span style=\"font-size:25px;font-weight:800;color:#9A6B12;\">COMPLEX</span><span style=\"background:#9A6B12;color:#fff;font-size:20px;font-weight:700;padding:3px 10px;border-radius:14px;\">IC + DC</span></div>\n        <div style=\"font-size:24px;color:#6E4E0E;margin-top:6px;\">Satu induk + satu anak kalimat.</div>\n        <div style=\"margin-top:auto;background:#fff;border-radius:8px;padding:10px 14px;font-size:24px;color:#3D3A33;\">\"<span style=\"color:#B23A30;font-weight:700;\">When she comes,</span> <span style=\"color:#9A6B12;font-weight:700;\">we start.</span>\"</div>\n      </div>\n      <div style=\"background:#FBE3E1;border-radius:14px;padding:18px 22px;display:flex;flex-direction:column;\">\n        <div style=\"display:flex;align-items:center;gap:10px;\"><span style=\"font-size:25px;font-weight:800;color:#B23A30;\">COMPOUND-COMPLEX</span><span style=\"background:#B23A30;color:#fff;font-size:19px;font-weight:700;padding:3px 10px;border-radius:14px;\">2 IC + DC</span></div>\n        <div style=\"font-size:24px;color:#7F2A22;margin-top:6px;\">Dua induk + minimal satu anak kalimat.</div>\n        <div style=\"margin-top:auto;background:#fff;border-radius:8px;padding:10px 14px;font-size:22px;color:#3D3A33;\">\"<span style=\"color:#B23A30;font-weight:700;\">She studies</span> and <span style=\"color:#B23A30;font-weight:700;\">practices</span> because <span style=\"color:#9A6B12;font-weight:700;\">she wants to be fluent.</span>\"</div>\n      </div>\n    </div>\n    <details style=\"background:#EAF6EC;border:2px dashed #8FBF98;border-radius:14px;padding:14px 24px;\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n        <span style=\"font-size:24px;font-weight:700;color:#2F6B3D;\"><span style=\"font-family:'Caveat',cursive;font-size:32px;\">Coba Yuk!</span> &nbsp;Klasifikasikan: \"Although it was raining, they played, and everyone had fun.\"</span>\n        <span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:24px;padding:9px 18px;border-radius:8px;white-space:nowrap;\">Lihat Jawaban →</span>\n      </summary>\n      <div style=\"margin-top:10px;font-size:24px;line-height:1.5;color:#2C3A2F;\"><strong>Compound-Complex</strong> — 1 DC (\"Although it was raining\") + 2 IC (\"they played\" + \"everyone had fun\").</div>\n    </details>\n  </div>"},{"label":"Tense: Bagan","html":"<div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"></div>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"></div>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:16px;\">\n    <div>\n      <span style=\"display:inline-block;background:#9B5FC0;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">TOPIK 08 · TENSE</span>\n      <div style=\"display:flex;align-items:baseline;gap:18px;margin-top:10px;\"><h2 style=\"font-size:52px;font-weight:800;margin:0;\">Peta Besar Tense</h2><span style=\"font-family:'Caveat',cursive;font-size:38px;color:#9B5FC0;\">kapan? &amp; bagaimana?</span></div>\n    </div>\n    <div style=\"background:#fff;border-radius:16px;padding:24px 30px 30px;box-shadow:0 6px 18px rgba(60,55,45,0.08);\">\n      <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#9B5FC0;margin-bottom:18px;\">GARIS WAKTU — KAPAN KEJADIANNYA?</div>\n      <div style=\"position:relative;height:96px;margin:0 10px;\">\n        <div style=\"position:absolute;top:46px;left:0;right:0;height:4px;background:#D9D2C4;border-radius:2px;\"></div>\n        <div style=\"position:absolute;top:30px;left:14%;width:36px;height:36px;border-radius:50%;background:#3B82C4;transform:translateX(-50%);\"></div>\n        <div style=\"position:absolute;top:24px;left:50%;width:48px;height:48px;border-radius:50%;background:#9B5FC0;transform:translateX(-50%);box-shadow:0 0 0 8px rgba(155,95,192,0.18);\"></div>\n        <div style=\"position:absolute;top:30px;left:86%;width:36px;height:36px;border-radius:50%;background:#4FA15B;transform:translateX(-50%);\"></div>\n        <div style=\"position:absolute;top:74px;left:14%;transform:translateX(-50%);font-size:24px;font-weight:800;color:#2A66A8;\">PAST</div>\n        <div style=\"position:absolute;top:78px;left:50%;transform:translateX(-50%);font-size:24px;font-weight:800;color:#7C4FB0;white-space:nowrap;\">Now (present)</div>\n        <div style=\"position:absolute;top:74px;left:86%;transform:translateX(-50%);font-size:24px;font-weight:800;color:#357A47;\">FUTURE</div>\n        <div style=\"position:absolute;top:2px;left:14%;transform:translateX(-50%);font-size:21px;color:#7A746A;font-style:italic;\">\"yesterday\"</div>\n        <div style=\"position:absolute;top:2px;left:50%;transform:translateX(-50%);font-size:21px;color:#7A746A;font-style:italic;\">\"now / today\"</div>\n        <div style=\"position:absolute;top:2px;left:86%;transform:translateX(-50%);font-size:21px;color:#7A746A;font-style:italic;\">\"tomorrow\"</div>\n      </div>\n    </div>\n    <div style=\"background:#fff;border-radius:16px;padding:20px 24px;box-shadow:0 6px 18px rgba(60,55,45,0.08);flex:1;min-height:0;display:flex;flex-direction:column;\">\n      <div style=\"font-size:24px;font-weight:800;letter-spacing:1px;color:#9B5FC0;margin-bottom:12px;\">CARA BACA TABEL: pilih BARIS dulu (kapan?) → lalu KOLOM (bentuknya?)</div>\n      <div style=\"display:grid;grid-template-columns:1.1fr 1fr 1fr 1fr;gap:10px;flex:1;\">\n        <details style=\"position:relative;background:#33302A;border-radius:8px;color:#FBF7EE;cursor:pointer;\">\n          <summary style=\"height:100%;padding:8px 12px;display:flex;flex-direction:column;justify-content:center;gap:3px;\">\n            <div style=\"font-size:21px;font-weight:800;color:#C9A8E4;\">→ BENTUK</div>\n            <div style=\"font-size:21px;font-weight:800;color:#9CC4E8;\">↓ WAKTU</div>\n            <div style=\"font-size:17px;color:#C9B8A0;\">klik: arti ▾</div>\n          </summary>\n          <div style=\"position:absolute;top:100%;left:0;z-index:5;width:330px;background:#33302A;color:#FBF7EE;border-radius:8px;padding:12px 16px;margin-top:6px;font-size:21px;line-height:1.45;box-shadow:0 8px 20px rgba(0,0,0,0.28);\"><strong style=\"color:#C9A8E4;\">Kolom = BENTUK</strong> (bagaimana aksinya): simple, continuous, perfect.<br><strong style=\"color:#9CC4E8;\">Baris = WAKTU</strong> (kapan terjadi): present, past, future.</div>\n        </details>\n        <div style=\"background:#DDF0E1;bord .5fr 1.5fr;flex:1;border-bottom:1px solid #F0EBDF;\">\n        <div style=\"padding:14px 16px;background:#F2F8F4;display:flex;flex-direction:column;justify-content:center;\"><div style=\"font-size:24px;font-weight:800;color:#357A47;\">Simple</div><div style=\"font-size:21px;color:#7A746A;\">will + V1</div></div>\n        <div style=\"padding:14px 16px;font-size:24px;display:flex;align-items:center;\"><span>She <strong style=\"color:#357A47;\">will study</strong> tomorrow.</span></div>\n        <div style=\"padding:14px 16px;font-size:24px;display:flex;align-items:center;border-left:1px solid #F0EBDF;\"><span>She <strong style=\"color:#B23A30;\">will not study</strong>.</span></div>\n        <div style=\"padding:14px 16px;font-size:24px;display:flex;align-items:center;border-left:1px solid #F0EBDF;\"><span><strong style=\"color:#357A47;\">Will</strong> she study?</span></div>\n      </div>\n      <div style=\"display:grid;grid-template-columns:1.15fr 1.5fr 1.5fr 1.5fr;flex:1;border-bottom:1px solid #F0EBDF;\">\n        <div style=\"padding:14px 16px;background:#F7F2FA;display:flex;flex-direction:column;justify-content:center;\"><div style=\"font-size:24px;font-weight:800;color:#7C4FB0;\">Continuous</div><div style=\"font-size:21px;color:#7A746A;\">will be + V-ing</div></div>\n        <div style=\"padding:14px 16px;font-size:24px;display:flex;align-items:center;\"><span>She <strong style=\"color:#7C4FB0;\">will be studying</strong>.</span></div>\n        <div style=\"padding:14px 16px;font-size:24px;display:flex;align-items:center;border-left:1px solid #F0EBDF;\"><span>She <strong style=\"color:#B23A30;\">won't be studying</strong>.</span></div>\n        <div style=\"padding:14px 16px;font-size:24px;display:flex;align-items:center;border-left:1px solid #F0EBDF;\"><span><strong style=\"color:#357A47;\">Will</strong> she be studying?</span></div>\n      </div>\n      <div style=\"display:grid;grid-template-columns:1.15fr 1.5fr 1.5fr 1.5fr;flex:1;\">\n        <div style=\"padding:14px 16px;background:#FBF6EC;display:flex;flex-direction:column;justify-content:center;\"><div style=\"font-size:24px;font-weight:800;color:#9A6B12;\">Perfect</div><div style=\"font-size:21px;color:#7A746A;\">will have + V3</div></div>\n        <div style=\"padding:14px 16px;font-size:24px;display:flex;align-items:center;\"><span>She <strong style=\"color:#9A6B12;\">will have studied</strong>.</span></div>\n        <div style=\"padding:14px 16px;font-size:24px;display:flex;align-items:center;border-left:1px solid #F0EBDF;\"><span>She <strong style=\"color:#B23A30;\">won't have studied</strong>.</span></div>\n        <div style=\"padding:14px 16px;font-size:24px;display:flex;align-items:center;border-left:1px solid #F0EBDF;\"><span><strong style=\"color:#357A47;\">Will</strong> she have studied?</span></div>\n      </div>\n    </div>\n    <div style=\"background:#FFF3BF;border-radius:8px;padding:11px 24px;box-shadow:0 5px 14px rgba(60,55,45,0.1);transform:rotate(-0.3deg);\"><span style=\"font-family:'Caveat',cursive;font-size:30px;color:#9A6B12;\">Cara Cepat:</span> <span style=\"font-size:24px;color:#5C4A1E;\">semua future pakai <strong>will</strong>. Negatif = will not (<strong>won't</strong>); tanya = <strong>Will</strong> + subjek di depan.</span></div>\n  </div>"},{"label":"Action &amp; Linking","html":"<div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 60px;\"></div>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"></div>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:16px;\">\n    <div>\n      <span style=\"display:inline-block;background:#9B5FC0;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">SIMPLE TENSE · DUA JENIS VERB</span>\n      <div style=\"display:flex;align-items:baseline;gap:18px;margin-top:10px;\"><h2 style=\"font-size:50px;font-weight:800;margin:0;\">Action vs Linking Verb</h2><span style=\"font-family:'Caveat',cursive;font-size:38px;color:#9B5FC0;\">kata kerja aksi &amp; penghubung</span></div>\n    </div>\n    <div style=\"background:#fff;border-radius:12px;padding:14px 24px;box-shadow:0 5px 14px rgba(60,55,45,0.07);\"><p style=\"font-size:24px;line-height:1.4;margin:0;color:#3D3A33;\">Di <strong>simple tense</strong>, kata kerja terbagi dua. Membedakannya penting agar tahu apa yang mengikutinya.</p></div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px;flex:1;min-height:0;\">\n      <div style=\"background:#fff;border-radius:16px;box-shadow:0 6px 18px rgba(60,55,45,0.08);border-top:6px solid #2A66A8;padding:24px 28px;display:flex;flex-direction:column;gap:12px;\">\n        <div><div style=\"font-size:30px;font-weight:800;color:#2A66A8;\">Action Verb</div><div style=\"font-size:24px;color:#7A746A;\">menunjukkan <strong>perbuatan / aksi</strong></div></div>\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px;\"><span style=\"background:#DCEAF6;color:#2A66A8;font-weight:700;font-size:24px;padding:5px 14px;border-radius:18px;\">run</span><span style=\"background:#DCEAF6;color:#2A66A8;font-weight:700;font-size:24px;padding:5px 14px;border-radius:18px;\">eat</span><span style=\"background:#DCEAF6;color:#2A66A8;font-weight:700;font-size:24px;padding:5px 14px;border-radius:18px;\">study</span><span style=\"background:#DCEAF6;color:#2A66A8;font-weight:700;font-size:24px;padding:5px 14px;border-radius:18px;\">write</span><span style=\"background:#DCEAF6;color:#2A66A8;font-weight:700;font-size:24px;padding:5px 14px;border-radius:18px;\">play</span></div>\n        <div style=\"font-size:24px;color:#3D3A33;background:#F4F8FC;border-radius:8px;padding:12px 16px;\">Diikuti <strong>objek / adverb</strong>:<br>\"She <span style=\"color:#2A66A8;font-weight:700;\">studies</span> English.\" <span style=\"color:#8A8377;font-style:italic;\">(belajar apa?)</span></div>\n        <div style=\"margin-top:auto;background:#EAF2FB;border-radius:8px;padding:12px 16px;font-size:24px;color:#1F4E80;\">\"They <strong>play</strong> football every Sunday.\"<br><span style=\"color:#8A8377;font-style:italic;\">Mereka bermain bola tiap Minggu.</span></div>\n      </div>\n      <div style=\"background:#fff;border-radius:16px;box-shadow:0 6px 18px rgba(60,55,45,0.08);border-top:6px solid #9A6B12;padding:24px 28px;display:flex;flex-direction:column;gap:12px;\">\n        <div><div style=\"font-size:30px;font-weight:800;color:#9A6B12;\">Linking Verb</div><div style=\"font-size:24px;color:#7A746A;\">menghubungkan subjek dengan <strong>keterangannya</strong></div></div>\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px;\"><span style=\"background:#FBF0D6;color:#9A6B12;font-weight:700;font-size:24px;padding:5px 14px;border-radius:18px;\">am / is / are</span><span style=\"background:#FBF0D6;color:#9A6B12;font-weight:700;font-size:24px;padding:5px 14px;border-radius:18px;\">was / were</span><span style=\"background:#FBF0D6;color:#9A6B12;font-weight:700;font-size:24px;padding:5px 14px;border-radius:18px;\">seem</span><span style=\"background:#FBF0D6;color:#9A6B12;font-weight:700;font-size:24px;padding:5px 14px;border-radius:18px;\">become</span></div>\n        <div style=\"font-size:24px;color:#3D3A33;background:#FBF7EC;border-radius:8px;padding:12px 16px;\">Diikuti <strong>kata sifat / benda</strong>:<br>\"She <span style=\"color:#9A6B12;font-weight:700;\">is</span> diligent.\" <span style=\"color:#8A8377;font-style:italic;\">(menerangkan She)</span></div>\n        <div style=\"margin-top:auto;background:#FBF6EC;border-radius:8px;padding:12px 16px;font-size:24px;color:#6E4E0E;\">\"They <strong>are</strong> good students.\"<br><span style=\"color:#8A8377;font-style:italic;\">Mereka adalah murid yang baik.</span></div>\n      </div>\n    </div>\n    <div style=\"background:#FFF3BF;border-radius:8px;padding:11px 24px;box-shadow:0 5px 14px rgba(60,55,45,0.1);transform:rotate(-0.3deg);\"><span style=\"font-family:'Caveat',cursive;font-size:30px;color:#9A6B12;\">Cara Cepat:</span> <span style=\"font-size:24px;color:#5C4A1E;\">linking verb (to be) <strong>tidak butuh objek</strong> — ingat: \"I <u>am</u> 16 years old\", bukan \"I have 16\".</span></div>\n  </div>"},{"label":"4 Langkah","html":"<div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"></div>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"></div>\n  <span style=\"display:inline-block;background:#33302A;color:#FBF7EE;font-weight:800;font-size:24px;letter-spacing:2px;padding:7px 16px;border-radius:8px;transform:rotate(-1deg);\">TUTORIAL · MERANGKAI KALIMAT</span>\n  <h2 style=\"font-size:58px;font-weight:800;margin:14px 0 2px;\">Merangkai Kalimat — 4 Langkah</h2>\n  <div style=\"font-family:'Caveat',cursive;font-size:38px;color:#7A746A;margin-bottom:26px;\">ikuti urutannya, dijamin rapi</div>\n  <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:18px;\">\n    <div style=\"background:#fff;border-radius:16px;padding:24px;box-shadow:0 6px 16px rgba(60,55,45,0.08);border-top:6px solid #E2574C;\">\n      <div style=\"font-size:46px;font-weight:800;color:#E2574C;line-height:1;\">1</div>\n      <div style=\"font-size:25px;font-weight:800;margin:8px 0 4px;\">Tentukan SUBJECT</div>\n      <div style=\"font-size:24px;color:#7A746A;line-height:1.4;\">Siapa / apa pelakunya?</div>\n      <div style=\"margin-top:14px;font-size:24px;font-weight:700;background:#FBE3E1;color:#B23A30;padding:8px 12px;border-radius:8p x;color:#FBF7EE;\">\n    <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#C9B8A0;margin-bottom:10px;\">HASIL KALIMAT LENGKAP</div>\n    <div style=\"font-size:34px;font-weight:700;line-height:1.5;\"><span style=\"color:#F4938A;\">She</span> <span style=\"color:#8FD89B;\">studies</span> <span style=\"color:#8FC4F0;\">English</span> <span style=\"color:#C9B8A0;\">carefully every day,</span> <span style=\"color:#C9A8E4;\">because she wants to be fluent.</span></div>\n  </div>"},{"label":"Contoh Bertahap","html":"<div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"></div>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"></div>\n  <span style=\"display:inline-block;background:#33302A;color:#FBF7EE;font-weight:800;font-size:24px;letter-spacing:2px;padding:7px 16px;border-radius:8px;transform:rotate(-1deg);\">TUTORIAL · CONTOH BERTAHAP</span>\n  <h2 style=\"font-size:58px;font-weight:800;margin:14px 0 2px;\">Membangun Kalimat Bertahap</h2>\n  <div style=\"font-family:'Caveat',cursive;font-size:38px;color:#7A746A;margin-bottom:24px;\">dari satu kata jadi kalimat kompleks</div>\n  <div style=\"display:flex;flex-direction:column;gap:13px;\">\n    <div style=\"display:flex;align-items:center;gap:20px;background:#fff;border-radius:12px;padding:16px 24px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <div style=\"flex:none;width:42px;height:42px;border-radius:50%;background:#E2574C;color:#fff;font-weight:800;font-size:24px;display:flex;align-items:center;justify-content:center;\">1</div>\n      <div style=\"flex:1;font-size:30px;font-weight:700;\"><span style=\"background:#FBE3E1;color:#B23A30;padding:2px 8px;border-radius:5px;\">She</span></div>\n      <div style=\"flex:none;font-family:'Caveat',cursive;font-size:30px;color:#E2574C;\">+ Subject</div>\n    </div>\n    <div style=\"display:flex;align-items:center;gap:20px;background:#fff;border-radius:12px;padding:16px 24px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <div style=\"flex:none;width:42px;height:42px;border-radius:50%;background:#4FA15B;color:#fff;font-weight:800;font-size:24px;display:flex;align-items:center;justify-content:center;\">2</div>\n      <div style=\"flex:1;font-size:30px;font-weight:700;\">She <span style=\"background:#DDF0E1;color:#357A47;padding:2px 8px;border-radius:5px;\">studies</span></div>\n      <div style=\"flex:none;font-family:'Caveat',cursive;font-size:30px;color:#4FA15B;\">+ Verb (present)</div>\n    </div>\n    <div style=\"display:flex;align-items:center;gap:20px;background:#fff;border-radius:12px;padding:16px 24px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <div style=\"flex:none;width:42px;height:42px;border-radius:50%;background:#3B82C4;color:#fff;font-weight:800;font-size:24px;display:flex;align-items:center;justify-content:center;\">3</div>\n      <div style=\"flex:1;font-size:30px;font-weight:700;\">She studies <span style=\"background:#DCEAF6;color:#2A66A8;padding:2px 8px;border-radius:5px;\">English</span></div>\n      <div style=\"flex:none;font-family:'Caveat',cursive;font-size:30px;color:#3B82C4;\">+ Object</div>\n    </div>\n    <div style=\"display:flex;align-items:center;gap:20px;background:#fff;border-radius:12px;padding:16px 24px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <div style=\"flex:none;width:42px;height:42px;border-radius:50%;background:#C9971A;color:#fff;font-weight:800;font-size:24px;display:flex;align-items:center;justify-content:center;\">4</div>\n      <div style=\"flex:1;font-size:30px;font-weight:700;\">She studies English <span style=\"background:#FBF0D6;color:#9A6B12;padding:2px 8px;border-radius:5px;\">carefully every day</span></div>\n      <div style=\"flex:none;font-family:'Caveat',cursive;font-size:30px;color:#C9971A;\">+ Keterangan</div>\n    </div>\n    <div style=\"display:flex;align-items:center;gap:20px;background:#33302A;border-radius:12px;padding:18px 24px;box-shadow:0 6px 16px rgba(60,55,45,0.14);\">\n      <div style=\"flex:none;width:42px;height:42px;border-radius:50%;background:#9B5FC0;color:#fff;font-weight:800;font-size:24px;display:flex;align-items:center;justify-content:center;\">5</div>\n      <div style=\"flex:1;font-size:28px;font-weight:700;color:#FBF7EE;\">She studies English carefully every day, <span style=\"background:#F0E4F7;color:#7C4FB0;padding:2px 8px;border-radius:5px;\">because she wants to be fluent</span>.</div>\n      <div style=\"flex:none;font-family:'Caveat',cursive;font-size:30px;color:#C9A8E4;\">+ Dependent clause → Complex</div>\n    </div>\n  </div>"},{"label":"Kesalahan Umum","html":"<div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"></div>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"></div>\n  <h2 style=\"font-size:58px;font-weight:800;margin:0 0 2px;\">Kesalahan Umum &amp; Perbaikannya</h2>\n  <div style=\"font-family:'Caveat',cursive;font-size:38px;color:#7A746A;margin-bottom:14px;\">hindari jebakan-jebakan ini</div>\n  <div style=\"display:flex;flex-direction:column;gap:14px;\">\n    <div style=\"display:grid;grid-template-columns:1fr 1fr 1.1fr;gap:16px;align-items:center;background:#fff;border-radius:12px;padding:16px 22px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <div style=\"font-size:25px;font-weight:700;color:#B23A30;\"><span style=\"color:#B23A30;font-weight:800;\">✗</span> He study hard.</div>\n      <div style=\"font-size:25px;font-weight:700;color:#357A47;\"><span style=\"font-weight:800;\">✓</span> He <span style=\"background:#DDF0E1;padding:1px 6px;border-radius:4px;\">studies</span> hard.</div>\n      <div style=\"font-size:24px;color:#7A746A;\">Subject he/she/it + <strong>-s</strong> pada simple present.</div>\n    </div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr 1.1fr;gap:16px;align-items:center;background:#fff;border-radius:12px;padding:16px 22px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <div style=\"font-size:25px;font-weight:700;color:#B23A30;\"><span style=\"font-weight:800;\">✗</span> She is study now.</div>\n      <div style=\"font-size:25px;font-weight:700;color:#357A47;\"><span style=\"font-weight:800;\">✓</span> She is <span style=\"background:#DDF0E1;padding:1px 6px;border-radius:4px;\">studying</span> now.</div>\n      <div style=\"font-size:24px;color:#7A746A;\">Continuous = <strong>be + V-ing</strong>.</div>\n    </div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr 1.1fr;gap:16px;align-items:center;background:#fff;border-radius:12px;padding:16px 22px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <div style=\"font-size:25px;font-weight:700;color:#B23A30;\"><span style=\"font-weight:800;\">✗</span> Yesterday books I read.</div>\n      <div style=\"font-size:25px;font-weight:700;color:#357A47;\"><span style=\"font-weight:800;\">✓</span> I read books yesterday.</div>\n      <div style=\"font-size:24px;color:#7A746A;\">Ikuti urutan <strong>S-V-O</strong>.</div>\n    </div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr 1.1fr;gap:16px;align-items:center;background:#fff;border-radius:12px;padding:16px 22px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <div style=\"font-size:25px;font-weight:700;color:#B23A30;\"><span style=\"font-weight:800;\">✗</span> Because she late.</div>\n      <div style=\"font-size:24px;font-weight:700;color:#357A47;\"><span style=\"font-weight:800;\">✓</span> Because she <span style=\"background:#DDF0E1;padding:1px 6px;border-radius:4px;\">was</span> late, she...</div>\n      <div style=\"font-size:24px;color:#7A746A;\">Dependent clause butuh <strong>verb</strong> + induk kalimat.</div>\n    </div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr 1.1fr;gap:16px;align-items:center;background:#fff;border-radius:12px;padding:16px 22px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <div style=\"font-size:25px;font-weight:700;color:#B23A30;\"><span style=\"font-weight:800;\">✗</span> I have 16 years old.</div>\n      <div style=\"font-size:25px;font-weight:700;color:#357A47;\"><span style=\"font-weight:800;\">✓</span> I <span style=\"background:#DDF0E1;padding:1px 6px;border-radius:4px;\">am</span> 16 years old.</div>\n      <div style=\"font-size:24px;color:#7A746A;\">Umur pakai <strong>to be</strong>, bukan \"have\".</div>\n    </div>\n    <div style=\"background:#FDF5F5;border-left:5px solid #B23A30;padding:18px;border-radius:8px;margin-top:12px;\">\n      <div style=\"font-size:24px;font-weight:800;color:#B23A30;margin-bottom:10px;\">📌 Perbedaan HAVE:</div>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;font-size:23px;\">\n        <div>\n          <div style=\"font-weight:700;color:#357A47;margin-bottom:6px;\">Possessive (Milik)</div>\n          <div style=\"color:#7A746A;\">I <strong>have</strong> a book.</div>\n          <div style=\"color:#7A746A;\">She <strong>has</strong> a cat.</div>\n          <div style=\"font-size:22px;color:#999;margin-top:8px;font-style:italic;\">= memiliki</div>\n        </div>\n        <div>\n          <div style=\"font-weight:700;color:#3B82C4;margin-bottom:6px;\">Auxiliary (Present Perfect)</div>\n          <div style=\"color:#7A746A;\">I <strong>have</strong> <u>finished</u>.</div>\n          <div style=\"color:#7A746A;\">She <strong>has</strong> <u>eaten</u>.</div>\n          <div style=\"font-size:22px;color:#999;margin-top:8px;font-style:italic;\">= have/has + past participle</div>\n        </div>\n      </div>\n    </div>\n  </div>\n  <div style=\"margin-top:13px;background:#EFEAFB;border-radius:14px;padding:14px 26px;border-left:6px solid #9B5FC0;\">\n    <div style=\"font-size:24px;font-weight:800;color:#7C4FB0;margin-bottom:7px;\">BONUS — dua wajah kata “have”</div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n      <div style=\"background:#fff;border-radius:10px;padding:11px 16px;\"><div style=\"font-size:23px;font-weight:800;color:#B23A30;\">have = kata kerja “milik”</div><div style=\"font-size:23px;color:#3D3A33;line-height:1.35;margin-top:2px;\">artinya <strong>punya</strong>. <em>“I <strong>have</strong> a book.”</em> → saya punya buku.</div></div>\n      <div style=\"background:#fff;border-radius:10px;padding:11px 16px;\"><div style=\"font-size:23px;font-weight:800;color:#2A66A8;\">have = kata bantu (perfect)</div><div style=\"font-size:23px;color:#3D3A33;line-height:1.35;margin-top:2px;\">have/has + <strong>V3</strong>. <em>“I <strong>have</strong> read it.”</em> → sudah membaca.</div></div>\n    </div>\n  </div>"},{"label":"Latihan: Pilihan Ganda","html":"<div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 60px;\"></div>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"></div>\n  <h2 style=\"font-size:52px;font-weight:800;margin:0 0 2px;\">Latihan 1 — Pilihan Ganda</h2>\n  <div style=\"font-family:'Caveat',cursive;font-size:36px;color:#7A746A;margin-bottom:18px;\">pilih jawaban, lalu buka kuncinya</div>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;\">\n    <details style=\"background:#fff;border:2px dashed #2A66A8;border-radius:14px;padding:16px 22px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\"><span style=\"font-size:24px;font-weight:700;\">1. She ___ to school every day.<br><span style=\"font-weight:600;color:#5C5448;\">a) go &nbsp; b) goes &nbsp; c) going</span></span><span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 14px;border-radius:8px;\">Kunci</span></summary>\n      <div style=\"margin-top:10px;font-size:24px;color:#357A47;font-weight:700;\">b) goes — simple present, subjek \"she\" + -s.</div>\n    </details>\n    <details style=\"background:#fff;border:2px dashed #7C4FB0;border-radius:14px;padding:16px 22px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\"><span style=\"font-size:24px;font-weight:700;\">2. Look! They ___ football now.<br><span style=\"font-weight:600;color:#5C5448;\">a) play &nbsp; b) plays &nbsp; c) are playing</span></span><span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 14px;border-radius:8px;\">Kunci</span></summary>\n      <div style=\"margin-top:10px;font-size:24px;color:#357A47;font-weight:700;\">c) are playing — ada \"now\" → present continuous.</div>\n    </details>\n    <details style=\"background:#fff;border:2px dashed #B23A30;border-radius:14px;padding:16px 22px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\"><span style=\"font-size:24px;font-weight:700;\">3. I ___ my homework an hour ago.<br><span style=\"font-weight:600;color:#5C5448;\">a) finish &nbsp; b) finished &nbsp; c) have finished</span></span><span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 14px;border-radius:8px;\">Kunci</span></summary>\n      <div style=\"margin-top:10px;font-size:24px;color:#357A47;font-weight:700;\">b) finished — ada \"ago\" → simple past (V2).</div>\n    </details>\n    <details style=\"background:#fff;border:2px dashed #2FA0A0;border-radius:14px;padding:16px 22px;box-shadow:0 4px 12px rgba(60,55,45,0.06);\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\"><span style=\"font-size:24px;font-weight:700;\">4. This pen is ___ . (milik saya)<br><span style=\"font-weight:600;color:#5C5448;\">a) my &nbsp; b) mine &nbsp; c) me</span></span><span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 14px;border-radius:8px;\">Kunci</span></summary>\n      <div style=\"margin-top:10px;font-size:24px;color:#357A47;font-weight:700;\">b) mine — possessive pronoun, berdiri sendiri.</div>\n    </details>\n    <details style=\"background:#fff;border:2px dashed #6B6FD6;border-radius:14px;padding:16px 22px;box-shadow:0 4px 12px rgba(60,55,45,0.06);grid-column:span 2;\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;\"><span style=\"font-size:24px;font-weight:700;\">5. Urutan benar: ___ &nbsp; <span style=\"font-weight:600;color:#5C5448;\">a) a red big ball &nbsp; b) a big red ball &nbsp; c) a ball red big</span></span><span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:22px;padding:8px 14px;border-radius:8px;\">Kunci</span></summary>\n      <div style=\"margin-top:10px;font-size:24px;color:#357A47;font-weight:700;\">b) a big red ball — Size sebelum Color (OSASCOMP).</div>\n    </details>\n  </div>\n  <div style=\"margin-top:16px;background:#FFF3BF;border-radius:8px;padding:12px 24px;transform:rotate(-0.5deg);box-shadow:0 5px 14px rgba(60,55,45,0.1);\"><span style=\"font-family:'Caveat',cursive;font-size:30px;color:#9A6B12;\">Tips:</span> <span style=\"font-size:24px;color:#5C4A1E;\">cari kata penanda waktu (now, ago, every day) untuk menentukan tense.</span></div>"},{"label":"Latihan: Menjodohkan","html":"<div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 60px;\"></div>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"></div>\n  <h2 style=\"font-size:52px;font-weight:800;margin:0 0 2px;\">Latihan 2 — Menjodohkan</h2>\n  <div style=\"font-family:'Caveat',cursive;font-size:36px;color:#7A746A;margin-bottom:18px;\">cocokkan istilah dengan contohnya</div>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;\">\n    <div style=\"display:flex;flex-direction:column;gap:12px;\">\n      <div style=\"font-size:24px;font-weight:800;letter-spacing:1px;color:#7A746A;\">ISTILAH</div>\n      <div style=\"background:#fff;border-radius:10px;padding:14px 18px;box-shadow:0 3px 10px rgba(60,55,45,0.06);font-size:24px;font-weight:700;\"><span style=\"color:#2A66A8;\">1.</span> Noun Phrase</div>\n      <div style=\"background:#fff;border-radius:10px;padding:14px 18px;box-shadow:0 3px 10px rgba(60,55,45,0.06);font-size:24px;font-weight:700;\"><span style=\"color:#2A66A8;\">2.</span> Dependent Clause</div>\n      <div style=\"background:#fff;border-radius:10px;padding:14px 18px;box-shadow:0 3px 10px rgba(60,55,45,0.06);font-size:24px;font-weight:700;\"><span style=\"color:#2A66A8;\">3.</span> Coordinating Conj.</div>\n      <div style=\"background:#fff;border-radius:10px;padding:14px 18px;box-shadow:0 3px 10px rgba(60,55,45,0.06);font-size:24px;font-weight:700;\"><span style=\"color:#2A66A8;\">4.</span> Present Perfect</div>\n      <div style=\"background:#fff;border-radius:10px;padding:14px 18px;box-shadow:0 3px 10px rgba(60,55,45,0.06);font-size:24px;font-weight:700;\"><span style=\"color:#2A66A8;\">5.</span> Reflexive Pronoun</div>\n    </div>\n    <div style=\"display:flex;flex-direction:column;gap:12px;\">\n      <div style=\"font-size:24px;font-weight:800;letter-spacing:1px;color:#7A746A;\">CONTOH / DEFINISI</div>\n      <div style=\"background:#fff;border-radius:10px;padding:14px 18px;box-shadow:0 3px 10px rgba(60,55,45,0.06);font-size:24px;\"><span style=\"color:#B23A30;font-weight:800;\">A.</span> \"because she was tired\"</div>\n      <div style=\"background:#fff;border-radius:10px;padding:14px 18px;box-shadow:0 3px 10px rgba(60,55,45,0.06);font-size:24px;\"><span style=\"color:#B23A30;font-weight:800;\">B.</span> \"myself, herself, themselves\"</div>\n      <div style=\"background:#fff;border-radius:10px;padding:14px 18px;box-shadow:0 3px 10px rgba(60,55,45,0.06);font-size:24px;\"><span style=\"color:#B23A30;font-weight:800;\">C.</span> \"the intelligent student\"</div>\n      <div style=\"background:#fff;border-radius:10px;padding:14px 18px;box-shadow:0 3px 10px rgba(60,55,45,0.06);font-size:24px;\"><span style=\"color:#B23A30;font-weight:800;\">D.</span> \"She has studied already.\"</div>\n      <div style=\"background:#fff;border-radius:10px;padding:14px 18px;box-shadow:0 3px 10px rgba(60,55,45,0.06);font-size:24px;\"><span style=\"color:#B23A30;font-weight:800;\">E.</span> \"and, but, or, so\" (FANBOYS)</div>\n    </div>\n  </div>\n  <details style=\"margin-top:18px;background:#EAF6EC;border:2px dashed #8FBF98;border-radius:14px;padding:16px 24px;\">\n    <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n      <span style=\"font-size:24px;font-weight:700;color:#2F6B3D;\"><span style=\"font-family:'Caveat',cursive;font-size:32px;\">Kunci Jawaban</span> &nbsp;cocokkan dulu sebelum membuka!</span>\n      <span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:24px;padding:9px 18px;border-radius:8px;white-space:nowrap;\">Lihat Kunci →</span>\n    </summary>\n    <div style=\"margin-top:12px;font-size:26px;line-height:1.6;color:#2C3A2F;font-weight:700;\">1 → C &nbsp;·&nbsp; 2 → A &nbsp;·&nbsp; 3 → E &nbsp;·&nbsp; 4 → D &nbsp;·&nbsp; 5 → B</div>\n  </details>"},{"label":"Rangkuman","html":"<div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"></div>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"></div>\n  <h2 style=\"font-size:58px;font-weight:800;margin:0 0 2px;\">Rangkuman Level 1</h2>\n  <div style=\"font-family:'Caveat',cursive;font-size:38px;color:#7A746A;margin-bottom:24px;\">delapan fondasi yang sudah kamu kuasai</div>\n  <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px;\">\n    <div style=\"background:#fff;border-radius:14px;padding:20px 22px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-left:6px solid #E2574C;\"><div style=\"font-size:24px;font-weight:800;color:#E2574C;\">Word</div><div style=\"font-size:24px;color:#5C5448;line-height:1.4;margin-top:4px;\">Noun, Verb, Adjective, Adverb</div></div>\n    <div style=\"background:#fff;border-radius:14px;padding:20px 22px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-left:6px solid #E8833A;\"><div style=\"font-size:24px;font-weight:800;color:#E8833A;\">Phrase</div><div style=\"font-size:24px;color:#5C5448;line-height:1.4;margin-top:4px;\">Noun / Prepositional / Adverbial</div></div>\n    <div style=\"background:#fff;border-radius:14px;padding:20px 22px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-left:6px solid #C9971A;\"><div style=\"font-size:24px;font-weight:800;color:#C9971A;\">Clause</div><div style=\"font-size:24px;color:#5C5448;line-height:1.4;margin-top:4px;\">Independent vs Dependent</div></div>\n    <div style=\"background:#fff;border-radius:14px;padding:20px 22px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-left:6px solid #2FA0A0;\"><div style=\"font-size:24px;font-weight:800;color:#2FA0A0;\">Pronouns</div><div style=\"font-size:24px;color:#5C5448;line-height:1.4;margin-top:4px;\">Personal, possessive, relative…</div></div>\n    <div style=\"background:#fff;border-radius:14px;padding:20px 22px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-left:6px solid #3B82C4;\"><div style=\"font-size:24px;font-weight:800;color:#3B82C4;\">Conjunction</div><div style=\"font-size:24px;color:#5C5448;line-height:1.4;margin-top:4px;\">Coordinating &amp; Subordinating</div></div>\n    <div style=\"background:#fff;border-radius:14px;padding:20px 22px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-left:6px solid #6B6FD6;\"><div style=\"font-size:24px;font-weight:800;color:#6B6FD6;\">Adjective Order</div><div style=\"font-size:24px;color:#5C5448;line-height:1.4;margin-top:4px;\">OSASCOMP</div></div>\n    <div style=\"background:#fff;border-radius:14px;padding:20px 22px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-left:6px solid #4FA15B;\"><div style=\"font-size:24px;font-weight:800;color:#4FA15B;\">Sentence</div><div style=\"font-size:24px;color:#5C5448;line-height:1.4;margin-top:4px;\">Simple → Compound-Complex</div></div>\n    <div style=\"background:#fff;border-radius:14px;padding:20px 22px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-left:6px solid #9B5FC0;\"><div style=\"font-size:24px;font-weight:800;color:#9B5FC0;\">Tense</div><div style=\"font-size:24px;color:#5C5448;line-height:1.4;margin-top:4px;\">Present · Past · Future (S/C/P)</div></div>\n  </div>\n  <div style=\"margin-top:26px;background:#EAF6EC;border-left:6px solid #4FA15B;border-radius:14px;padding:22px 30px;\">\n    <span style=\"font-family:'Caveat',cursive;font-size:36px;color:#2F6B3D;\">Kunci utama:</span> <span style=\"font-size:25px;color:#2C3A2F;line-height:1.5;\">kuasai blok-blok dasar ini dulu — kata, klausa, dan urutannya — sebelum melangkah ke materi lanjutan di Level 2.</span>\n  </div>"},{"label":"Penutup","html":"<div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(255,255,255,0.20) 6.5px,rgba(255,255,255,0.08) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 80px;\"></div>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:rgba(255,255,255,0.35);\"></div>\n  <div style=\"display:flex;flex-direction:column;justify-content:center;height:100%;padding:80px 90px 80px 172px;\">\n    <div style=\"font-family:'Caveat',cursive;font-size:64px;line-height:1;opacity:0.92;\">terus berlatih, ya!</div>\n    <h2 style=\"font-size:104px;font-weight:800;margin:6px 0 18px;letter-spacing:-1px;\">Sampai Jumpa!</h2>\n    <p style=\"font-size:32px;line-height:1.55;max-width:1000px;opacity:0.95;margin:0 0 40px;\">Latihan tiap hari membuat grammar makin lancar. Buka materi ini kapan saja, ulangi soal-soalnya, lalu lanjut ke <strong>Level 2: tenses lanjutan &amp; kalimat kompleks</strong>.</p>\n    <div style=\"display:flex;gap:14px;flex-wrap:wrap;\">\n      <span style=\"background:rgba(255,255,255,0.18);border:1.5px solid rgba(255,255,255,0.4);padding:12px 22px;border-radius:30px;font-size:24px;font-weight:700;\">Practice makes perfect</span>\n      <span style=\"background:rgba(255,255,255,0.18);border:1.5px solid rgba(255,255,255,0.4);padding:12px 22px;border-radius:30px;font-size:24px;font-weight:700;\">English Grammar Hub · Level 1</span>\n    </div>\n    <div style=\"position:absolute;bottom:54px;right:74px;background:#fff;color:#7C4FB0;font-family:'Caveat',cursive;font-size:42px;font-weight:700;padding:10px 28px;border-radius:14px;transform:rotate(-2.5deg);box-shadow:0 8px 20px rgba(0,0,0,0.18);\">by Mr. Fio 😁</div>\n  </div>"}];
let currentIdx = 0;

function showSlide(idx) {
  if (idx < 0 || idx >= SLIDES.length) return;
  
  currentIdx = idx;
  
  const slides = document.querySelectorAll('.presenter-slide');
  slides.forEach((s, i) => s.classList.toggle('active', i === idx));
  
  const btns = document.querySelectorAll('.sidebar-button');
  btns.forEach((b, i) => b.classList.toggle('active', i === idx));
  
  document.getElementById('current').textContent = idx + 1;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === SLIDES.length - 1;
  
  document.getElementById('slides-container').scrollTop = 0;
}

function goSlide(delta) {
  showSlide(currentIdx + delta);
}

function toggleFullscreen() {
  document.body.classList.toggle('fullscreen');
  const btn = document.getElementById('fullscreenToggle');
  btn.textContent = document.body.classList.contains('fullscreen') ? '⛶ Exit Fullscreen' : '⛶ Fullscreen';
}

const container = document.getElementById('slides-container');
SLIDES.forEach((slide, i) => {
  const div = document.createElement('div');
  div.className = 'presenter-slide' + (i === 0 ? ' active' : '');
  div.innerHTML = slide.html;
  container.appendChild(div);
});

const sidebar = document.getElementById('sidebar');
SLIDES.forEach((slide, i) => {
  const btn = document.createElement('button');
  btn.className = 'sidebar-button' + (i === 0 ? ' active' : '');
  btn.textContent = (i + 1) + '. ' + slide.label;
  btn.onclick = () => showSlide(i);
  sidebar.appendChild(btn);
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') goSlide(1);
  if (e.key === 'ArrowLeft') goSlide(-1);
  if (e.key === 'Escape' && document.body.classList.contains('fullscreen')) {
    toggleFullscreen();
  }
});

showSlide(0);
</script>
