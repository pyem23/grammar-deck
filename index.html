<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>English Grammar Level 1 - Interactive Presenter</title>
  
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&amp;family=Caveat:wght@500;700&amp;display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  summary{list-style:none;cursor:pointer;outline:none;}
  summary::-webkit-details-marker{display:none;}
  details[open] .rv-btn{background:#2F6B3D !important;}
</style>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #1a1a1a; }
    
    .presenter-layout {
      display: flex;
      height: 100vh;
      background: #1a1a1a;
    }
    
    .presenter-sidebar {
      width: 240px;
      background: #0d0d0d;
      border-right: 1px solid #333;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }
    
    .sidebar-button {
      padding: 12px;
      background: #222;
      color: #ccc;
      border: 1px solid #333;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      line-height: 1.4;
      text-align: left;
      min-height: 70px;
      transition: all 0.2s ease;
    }
    
    .sidebar-button:hover {
      background: #333;
      border-color: #555;
      color: #fff;
    }
    
    .sidebar-button.active {
      background: #17A2B8;
      border-color: #0f7a8a;
      color: white;
      font-weight: 700;
    }
    
    .presenter-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #FBF7EE;
    }
    
    .presenter-header {
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .slide-counter {
      color: #999;
      font-size: 14px;
      font-weight: 500;
    }
    
    .fullscreen-btn {
      background: #17A2B8;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.2s;
    }
    
    .fullscreen-btn:hover { background: #138496; }
    
    .presenter-slides {
      flex: 1;
      overflow-y: auto;
      background: #FBF7EE;
      padding: 0;
    }
    
    .presenter-slide {
      display: none;
      min-height: 100%;
      padding: 48px 64px;
      background: #FBF7EE;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .presenter-slide.active {
      display: block;
    }
    
    .presenter-controls {
      background: #1a1a1a;
      border-top: 1px solid #333;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    
    .control-group {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    
    .presenter-btn {
      background: #17A2B8;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
    }
    
    .presenter-btn:hover { background: #138496; }
    .presenter-btn:disabled { background: #555; cursor: not-allowed; opacity: 0.5; }
    
    /* Fullscreen mode */
    body.fullscreen {
      overflow: hidden;
    }
    
    body.fullscreen .presenter-sidebar {
      display: none;
    }
    
    body.fullscreen .presenter-header {
      display: none;
    }
    
    body.fullscreen .presenter-controls {
      display: none;
    }
    
    body.fullscreen .presenter-slide {
      padding: 60px 80px;
      min-height: 100vh;
      overflow-y: auto;
    }
    
    .fullscreen-hint {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px 16px;
      border-radius: 4px;
      font-size: 12px;
      z-index: 10000;
      display: none;
    }
    
    body.fullscreen .fullscreen-hint {
      display: block;
    }
  </style>
</head>
<body>

<div class="presenter-layout">
  <div class="presenter-sidebar" id="sidebar"></div>
  
  <div class="presenter-main">
    <div class="presenter-header">
      <span class="slide-counter"><span id="current">1</span> / <span id="total">27</span></span>
      <button class="fullscreen-btn" id="fullscreenToggle" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    </div>
    
    <div class="presenter-slides" id="slides-container"></div>
    
    <div class="presenter-controls">
      <div class="control-group">
        <button class="presenter-btn" id="prevBtn" onclick="goSlide(-1)">← Previous</button>
        <button class="presenter-btn" id="nextBtn" onclick="goSlide(1)">Next →</button>
      </div>
      <span style="color: #999; font-size: 12px;">← → arrow keys to navigate</span>
    </div>
  </div>
</div>

<div class="fullscreen-hint">Press ESC to exit fullscreen</div>

<script>
const SLIDES = [{"label":"Cover","html":"<div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.16) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 80px;\"></div>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"></div>\n  <div style=\"position:absolute;top:64px;right:74px;background:#fff;border:2px solid #E2574C;color:#C2453B;font-weight:800;font-size:24px;letter-spacing:1px;padding:12px 22px;border-radius:10px;transform:rotate(2deg);box-shadow:0 6px 16px rgba(60,55,45,0.12);\">Belajar Mandiri</div>\n  <div style=\"display:flex;flex-direction:column;justify-content:center;height:100%;padding:80px 90px 80px 172px;\">\n    <div style=\"font-family:'Caveat',cursive;font-size:52px;color:#6B6FD6;line-height:1;margin-bottom:6px;\">selamat datang di</div>\n    <h1 style=\"font-size:124px;font-weight:800;margin:0;line-height:1.02;letter-spacing:-2px;\">English Grammar</h1>\n    <div style=\"position:relative;width:760px;height:20px;margin:8px 0 30px;background:rgba(155,95,192,0.30);border-radius:8px;\"></div>\n    <div style=\"font-family:'Caveat',cursive;font-size:58px;color:#33302A;\">Level 1 — Fondasi Tata Bahasa Inggris</div>\n    <p style=\"font-size:30px;color:#7A746A;margin:18px 0 46px;max-width:900px;line-height:1.5;\">Kenali blok-blok dasar bahasa Inggris: dari <strong>kata</strong> sampai <strong>kalimat utuh</strong> — lengkap dengan tabel, tips cepat, dan latihan.</p>\n    <div style=\"display:flex;flex-wrap:wrap;gap:14px;\">\n      <span style=\"background:#E2574C;color:#fff;font-weight:700;font-size:24px;padding:10px 18px;border-radius:8px 8px 0 0;transform:rotate(-1.5deg);\">Word</span>\n      <span style=\"background:#E8833A;color:#fff;font-weight:700;font-size:24px;padding:10px 18px;border-radius:8px 8px 0 0;transform:rotate(1deg);\">Phrase</span>\n      <span style=\"background:#C9971A;color:#fff;font-weight:700;font-size:24px;padding:10px 18px;border-radius:8px 8px 0 0;transform:rotate(-1deg);\">Clause</span>\n      <span style=\"background:#2FA0A0;color:#fff;font-weight:700;font-size:24px;padding:10px 18px;border-radius:8px 8px 0 0;transform:rotate(1.5deg);\">Pronouns</span>\n      <span style=\"background:#3B82C4;color:#fff;font-weight:700;font-size:24px;padding:10px 18px;border-radius:8px 8px 0 0;transform:rotate(-1deg);\">Conjunction</span>\n      <span style=\"background:#6B6FD6;color:#fff;font-weight:700;font-size:24px;padding:10px 18px;border-radius:8px 8px 0 0;transform:rotate(1deg);\">Adjective Order</span>\n      <span style=\"background:#4FA15B;color:#fff;font-weight:700;font-size:24px;padding:10px 18px;border-radius:8px 8px 0 0;transform:rotate(-1.5deg);\">Sentence</span>\n      <span style=\"background:#9B5FC0;color:#fff;font-weight:700;font-size:24px;padding:10px 18px;border-radius:8px 8px 0 0;transform:rotate(1deg);\">Tense</span>\n    </div>\n  </div>"},{"label":"Alur Pemahaman","html":"<div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 70px;\"></div>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"></div>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:20px;\">\n    <div>\n      <span style=\"display:inline-block;background:#33302A;color:#FBF7EE;font-weight:800;font-size:23px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1deg);\">GAMBARAN BESAR</span>\n      <h2 style=\"font-size:54px;font-weight:800;margin:12px 0 4px;\">Urutan Memahami Bahasa Inggris</h2>\n      <div style=\"font-family:'Caveat',cursive;font-size:36px;color:#7A746A;\">dari unit terkecil sampai kalimat kompleks</div>\n    </div>\n    <div style=\"background:#fff;border-radius:14px;padding:18px 26px;box-shadow:0 5px 14px rgba(60,55,45,0.07);\">\n      <p style=\"font-size:25px;line-height:1.45;margin:0;color:#3D3A33;\">Inti belajar bahasa Inggris adalah memahami <strong>urutan pembentuk kalimat</strong>: kata yang berdiri sendiri dirangkai bertahap hingga menjadi kalimat yang utuh dan kompleks. Inilah peta perjalanannya:</p>\n    </div>\n    <div style=\"flex:1;min-height:0;display:flex;align-items:center;justify-content:center;gap:8px;\">\n      <!-- WORD -->\n      <div style=\"flex:1;background:#fff;border-radius:18px;border-top:7px solid #E2574C;box-shadow:0 8px 20px rgba(60,55,45,0.1);padding:26px 22px;text-align:center;align-self:stretch;display:flex;flex-direction:column;justify-content:center;\">\n        <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#E2574C;\">LANGKAH 1</div>\n        <div style=\"font-size:40px;font-weight:800;margin:6px 0 4px;\">Word</div>\n        <div style=\"font-size:24px;color:#7A746A;line-height:1.3;\">kata — unit terkecil</div>\n        <div style=\"display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:14px;\">\n          <span style=\"background:#FBE3E1;color:#B23A30;font-weight:700;font-size:21px;padding:4px 11px;border-radius:16px;\">noun</span>\n          <span style=\"background:#DCEAF6;color:#2A66A8;font-weight:700;font-size:21px;padding:4px 11px;border-radius:16px;\">verb</span>\n          <span style=\"background:#E0F1F1;color:#1E7878;font-weight:700;font-size:21px;padding:4px 11px;border-radius:16px;\">pronoun</span>\n          <span style=\"background:#EAEAFB;color:#4B4FB0;font-weight:700;font-size:21px;padding:4px 11px;border-radius:16px;\">conjunction</span>\n          <span style=\"background:#F0EEE6;color:#7A746A;font-weight:700;font-size:21px;padding:4px 11px;border-radius:16px;\">dll.</span>\n        </div>\n      </div>\n      <div style=\"flex:none;display:flex;flex-direction:column;align-items:center;color:#C9971A;\">\n        <div style=\"font-size:54px;font-weight:800;line-height:0.8;\">→</div>\n        <div style=\"font-family:'Caveat',cursive;font-size:26px;color:#9A6B12;margin-top:2px;\">dirangkai</div>\n      </div>\n      <!-- PHRASE -->\n      <div style=\"flex:1;background:#fff;border-radius:18px;border-top:7px solid #E8833A;box-shadow:0 8px 20px rgba(60,55,45,0.1);padding:26px 22px;text-align:center;align-self:stretch;display:flex;flex-direction:column;justify-content:center;\">\n        <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#E8833A;\">LANGKAH 2</div>\n        <div style=\"font-size:40px;font-weight:800;margin:6px 0 4px;\">Phrase</div>\n        <div style=\"font-size:24px;color:#7A746A;line-height:1.3;\">kelompok kata, <strong>belum</strong> ada S + V</div>\n        <div style=\"margin-top:14px;font-size:23px;background:#FBEFE3;color:#C56A1E;border-radius:10px;padding:8px 12px;\">\"the smart student\"</div>\n      </div>\n      <div style=\"flex:none;display:flex;flex-direction:column;align-items:center;color:#C9971A;\">\n        <div style=\"font-size:54px;font-weight:800;line-height:0.8;\">→</div>\n        <div style=\"font-family:'Caveat',cursive;font-size:26px;color:#9A6B12;margin-top:2px;\">+ S & V</div>\n      </div>\n      <!-- CLAUSE -->\n      <div style=\"flex:1;background:#fff;border-radius:18px;border-top:7px solid #C9971A;box-shadow:0 8px 20px rgba(60,55,45,0.1);padding:26px 22px;text-align:center;align-self:stretch;display:flex;flex-direction:column;justify-content:center;\">\n        <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#C9971A;\">LANGKAH 3</div>\n        <div style=\"font-size:40px;font-weight:800;margin:6px 0 4px;\">Clause</div>\n        <div style=\"font-size:24px;color:#7A746A;line-height:1.3;\">klausa — <strong>sudah</strong> ada S + V</div>\n        <div style=\"margin-top:14px;font-size:23px;background:#FBF6EC;color:#9A6B12;border-radius:10px;padding:8px 12px;\">\"the student reads\"</div>\n      </div>\n      <div style=\"flex:none;display:flex;flex-direction:column;align-items:center;color:#C9971A;\">\n        <div style=\"font-size:54px;font-weight:800;line-height:0.8;\">→</div>\n        <div style=\"font-family:'Caveat',cursive;font-size:26px;color:#9A6B12;margin-top:2px;\">digabung</div>\n      </div>\n      <!-- SENTENCE -->\n      <div style=\"flex:1.05;background:#33302A;border-radius:18px;border-top:7px solid #4FA15B;box-shadow:0 8px 22px rgba(60,55,45,0.18);padding:26px 22px;text-align:center;align-self:stretch;display:flex;flex-direction:column;justify-content:center;color:#FBF7EE;\">\n        <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#8FD89B;\">LANGKAH 4</div>\n        <div style=\"font-size:40px;font-weight:800;margin:6px 0 4px;\">Sentence</div>\n        <div style=\"font-size:24px;color:#C9B8A0;line-height:1.3;\">kalimat — simple → <strong style=\"color:#fff;\">complex</strong></div>\n        <div style=\"margin-top:14px;font-size:22px;background:rgba(255,255,255,0.12);color:#fff;border-radius:10px;padding:8px 12px;\">\"The student reads because…\"</div>\n      </div>\n    </div>\n    <div style=\"background:#FFF3BF;border-radius:8px;padding:12px 26px;box-shadow:0 5px 14px rgba(60,55,45,0.1);transform:rotate(-0.4deg);\"><span style=\"font-family:'Caveat',cursive;font-size:32px;color:#9A6B12;\">Inti:</span> <span style=\"font-size:24px;color:#5C4A1E;\">kuasai tiap tahap berurutan — melompat tahap membuat kalimat jadi berantakan.</span></div>\n  </div>"},{"label":"Daftar Isi","html":"<div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 70px;\"></div>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"></div>\n  <h2 style=\"font-size:62px;font-weight:800;margin:0 0 4px;\">Daftar Isi</h2>\n  <div style=\"font-family:'Caveat',cursive;font-size:38px;color:#7A746A;margin-bottom:32px;\">disusun dari kata terkecil sampai kalimat utuh</div>\n  <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:20px;\">\n    <div style=\"background:#fff;border-radius:14px;padding:22px 24px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-bottom:5px solid #E2574C;\"><div style=\"font-size:34px;font-weight:800;color:#E2574C;\">01</div><div style=\"font-size:27px;font-weight:800;margin-top:4px;\">Word</div><div style=\"font-size:24px;color:#7A746A;\">Kelas kata</div></div>\n    <div style=\"background:#fff;border-radius:14px;padding:22px 24px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-bottom:5px solid #2FA0A0;\"><div style=\"font-size:34px;font-weight:800;color:#2FA0A0;\">02</div><div style=\"font-size:27px;font-weight:800;margin-top:4px;\">Pronouns</div><div style=\"font-size:24px;color:#7A746A;\">Kata ganti</div></div>\n    <div style=\"background:#fff;border-radius:14px;padding:22px 24px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-bottom:5px solid #3B82C4;\"><div style=\"font-size:34px;font-weight:800;color:#3B82C4;\">03</div><div style=\"font-size:27px;font-weight:800;margin-top:4px;\">Conjunction</div><div style=\"font-size:24px;color:#7A746A;\">Kata hubung</div></div>\n    <div style=\"background:#fff;border-radius:14px;padding:22px 24px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-bottom:5px solid #E8833A;\"><div style=\"font-size:34px;font-weight:800;color:#E8833A;\">04</div><div style=\"font-size:27px;font-weight:800;margin-top:4px;\">Phrase</div><div style=\"font-size:24px;color:#7A746A;\">Kelompok kata</div></div>\n    <div style=\"background:#fff;border-radius:14px;padding:22px 24px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-bottom:5px solid #6B6FD6;\"><div style=\"font-size:34px;font-weight:800;color:#6B6FD6;\">05</div><div style=\"font-size:27px;font-weight:800;margin-top:4px;\">Adjective Order</div><div style=\"font-size:24px;color:#7A746A;\">Urutan kata sifat</div></div>\n    <div style=\"background:#fff;border-radius:14px;padding:22px 24px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-bottom:5px solid #C9971A;\"><div style=\"font-size:34px;font-weight:800;color:#C9971A;\">06</div><div style=\"font-size:27px;font-weight:800;margin-top:4px;\">Clause</div><div style=\"font-size:24px;color:#7A746A;\">Anak &amp; induk kalimat</div></div>\n    <div style=\"background:#fff;border-radius:14px;padding:22px 24px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-bottom:5px solid #4FA15B;\"><div style=\"font-size:34px;font-weight:800;color:#4FA15B;\">07</div><div style=\"font-size:27px;font-weight:800;margin-top:4px;\">Sentence</div><div style=\"font-size:24px;color:#7A746A;\">Tipe kalimat</div></div>\n    <div style=\"background:#fff;border-radius:14px;padding:22px 24px;box-shadow:0 5px 14px rgba(60,55,45,0.07);border-bottom:5px solid #9B5FC0;\"><div style=\"font-size:34px;font-weight:800;color:#9B5FC0;\">08</div><div style=\"font-size:27px;font-weight:800;margin-top:4px;\">Tense</div><div style=\"font-size:24px;color:#7A746A;\">Present · Past · Future</div></div>\n  </div>\n  <div style=\"display:flex;gap:18px;margin-top:26px;\">\n    <div style=\"flex:1;background:#EFEAFB;border-radius:14px;padding:20px 26px;border-left:6px solid #9B5FC0;\"><div style=\"font-size:25px;font-weight:800;color:#7C4FB0;\">＋ Tutorial Merangkai Kalimat</div><div style=\"font-size:24px;color:#5C5448;margin-top:4px;\">4 langkah + contoh membangun kalimat bertahap</div></div>\n    <div style=\"flex:1;background:#FBE9E6;border-radius:14px;padding:20px 26px;border-left:6px solid #E2574C;\"><div style=\"font-size:25px;font-weight:800;color:#C2453B;\">＋ Kesalahan Umum &amp; Latihan</div><div style=\"font-size:24px;color:#5C5448;margin-top:4px;\">Pilihan ganda + menjodohkan, lengkap dengan kunci</div></div>\n  </div>"},{"label":"Cara Membaca","html":"<div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 70px;\"></div>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"></div>\n  <h2 style=\"font-size:60px;font-weight:800;margin:0 0 4px;\">Cara Membaca Materi Ini</h2>\n  <div style=\"font-family:'Caveat',cursive;font-size:38px;color:#7A746A;margin-bottom:30px;\">tiga hal supaya belajarmu lancar</div>\n  <div style=\"display:grid;grid-template-columns:1.25fr 1fr;gap:28px;align-items:start;\">\n    <div style=\"background:#fff;border-radius:16px;padding:30px 32px;box-shadow:0 6px 18px rgba(60,55,45,0.08);\">\n      <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#7A746A;margin-bottom:18px;\">1 · KODE WARNA KELAS KATA</div>\n      <div style=\"font-size:32px;line-height:1.9;font-weight:600;\">The <span style=\"background:#FBF0D6;color:#9A6B12;padding:2px 8px;border-radius:5px;font-weight:700;\">intelligent</span> <span style=\"background:#FBE3E1;color:#B23A30;padding:2px 8px;border-radius:5px;font-weight:700;\">student</span> <span style=\"background:#DCEAF6;color:#2A66A8;padding:2px 8px;border-radius:5px;font-weight:700;\">reads</span> a book <span style=\"background:#DDF0E1;color:#357A47;padding:2px 8px;border-radius:5px;font-weight:700;\">carefully</span>.</div>\n      <div style=\"display:flex;flex-wrap:wrap;gap:12px;margin-top:24px;\">\n        <span style=\"font-size:24px;font-weight:700;padding:8px 16px;border-radius:22px;background:#FBE3E1;color:#B23A30;\">● Noun (benda)</span>\n        <span style=\"font-size:24px;font-weight:700;padding:8px 16px;border-radius:22px;background:#DCEAF6;color:#2A66A8;\">● Verb (kerja)</span>\n        <span style=\"font-size:24px;font-weight:700;padding:8px 16px;border-radius:22px;background:#FBF0D6;color:#9A6B12;\">● Adjective (sifat)</span>\n        <span style=\"font-size:24px;font-weight:700;padding:8px 16px;border-radius:22px;background:#DDF0E1;color:#357A47;\">● Adverb (keterangan)</span>\n      </div>\n    </div>\n    <div style=\"display:flex;flex-direction:column;gap:24px;\">\n      <div style=\"background:#FFF3BF;border-radius:8px;padding:22px 26px;box-shadow:0 6px 16px rgba(60,55,45,0.12);transform:rotate(1.2deg);\">\n        <div style=\"font-family:'Caveat',cursive;font-size:40px;font-weight:700;color:#9A6B12;margin-bottom:2px;\">Cara Cepat</div>\n        <div style=\"font-size:24px;line-height:1.45;color:#5C4A1E;\">Kotak kuning ini berisi <strong>trik singkat</strong> supaya cepat paham — selalu ada di tiap topik.</div>\n      </div>\n      <details style=\"background:#EAF6EC;border:2px dashed #8FBF98;border-radius:14px;padding:18px 24px;\">\n        <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n          <span style=\"font-size:24px;font-weight:700;color:#2F6B3D;\"><span style=\"font-family:'Caveat',cursive;font-size:34px;\">Coba Yuk!</span> &nbsp;Jawaban disembunyikan dulu</span>\n          <span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:24px;padding:9px 18px;border-radius:8px;white-space:nowrap;\">Lihat Jawaban →</span>\n        </summary>\n        <div style=\"margin-top:14px;font-size:24px;line-height:1.5;color:#2C3A2F;\">Bagus! Coba dulu sendiri, baru klik tombol ini untuk mencocokkan jawaban. 👍</div>\n      </details>\n    </div>\n  </div>"},{"label":"Word","html":"<div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"></div>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"></div>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:22px;\">\n    <div>\n      <span style=\"display:inline-block;background:#E2574C;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:7px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">TOPIK 01 · WORD</span>\n      <div style=\"display:flex;align-items:baseline;gap:18px;margin-top:12px;\"><h2 style=\"font-size:56px;font-weight:800;margin:0;\">Word</h2><span style=\"font-family:'Caveat',cursive;font-size:40px;color:#E2574C;\">kelas kata</span></div>\n      <div style=\"height:13px;width:250px;background:rgba(226,87,76,0.30);border-radius:6px;margin-top:2px;\"></div>\n    </div>\n    <div style=\"display:grid;grid-template-columns:1fr 1.1fr;gap:30px;flex:1;min-height:0;\">\n      <div style=\"display:flex;flex-direction:column;gap:20px;\">\n        <div style=\"background:#fff;border-top:5px solid #E2574C;border-radius:14px;padding:24px 26px;box-shadow:0 6px 18px rgba(60,55,45,0.08);\">\n          <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#E2574C;margin-bottom:10px;\">DEFINISI</div>\n          <p style=\"font-size:26px;line-height:1.5;margin:0;color:#3D3A33;\"><strong>Word</strong> (kata) adalah unit terkecil bahasa yang punya makna. Setiap kata masuk salah satu kelas utama: <strong>Noun, Verb, Adjective,</strong> atau <strong>Adverb</strong>.</p>\n        </div>\n        <div style=\"background:#FFF3BF;border-radius:8px;padding:20px 24px;box-shadow:0 6px 16px rgba(60,55,45,0.12);transform:rotate(1deg);\">\n          <div style=\"font-family:'Caveat',cursive;font-size:36px;font-weight:700;color:#9A6B12;\">Cara Cepat</div>\n          <p style=\"font-size:24px;line-height:1.4;margin:4px 0 0;color:#5C4A1E;\">Lihat <strong>fungsinya</strong>, bukan bentuknya. Akhiran <strong>-ly</strong> biasanya Adverb; kata yang bisa didahului <strong>\"the\"</strong> biasanya Noun.</p>\n        </div>\n      </div>\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div style=\"background:#fff;border:1px solid #ECE6D8;border-radius:14px;padding:24px 26px;box-shadow:0 6px 18px rgba(60,55,45,0.08);\">\n          <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#7A746A;margin-bottom:12px;\">CONTOH</div>\n          <p style=\"font-size:28px;line-height:1.6;margin:0 0 8px;font-weight:600;\">The <span style=\"background:#FBF0D6;color:#9A6B12;padding:2px 7px;border-radius:5px;font-weight:700;\">intelligent</span> <span style=\"background:#FBE3E1;color:#B23A30;padding:2px 7px;border-radius:5px;font-weight:700;\">student</span> <span style=\"background:#DCEAF6;color:#2A66A8;padding:2px 7px;border-radius:5px;font-weight:700;\">reads</span> an <span style=\"background:#FBF0D6;color:#9A6B12;padding:2px 7px;border-radius:5px;font-weight:700;\">interesting</span> <span style=\"background:#FBE3E1;color:#B23A30;padding:2px 7px;border-radius:5px;font-weight:700;\">book</span> <span style=\"background:#DDF0E1;color:#357A47;padding:2px 7px;border-radius:5px;font-weight:700;\">carefully</span>.</p>\n          <p style=\"font-size:24px;font-style:italic;color:#8A8377;margin:0;\">\"Murid yang cerdas membaca buku menarik dengan hati-hati.\"</p>\n        </div>\n        <div style=\"display:flex;flex-wrap:wrap;gap:10px;\">\n          <span style=\"font-size:24px;font-weight:700;padding:7px 14px;border-radius:20px;background:#FBE3E1;color:#B23A30;\">Noun: student, book</span>\n          <span style=\"font-size:24px;font-weight:700;padding:7px 14px;border-radius:20px;background:#DCEAF6;color:#2A66A8;\">Verb: reads</span>\n          <span style=\"font-size:24px;font-weight:700;padding:7px 14px;border-radius:20px;background:#FBF0D6;color:#9A6B12;\">Adj: intelligent, interesting</span>\n          <span style=\"font-size:24px;font-weight:700;padding:7px 14px;border-radius:20px;background:#DDF0E1;color:#357A47;\">Adverb: carefully</span>\n        </div>\n      </div>\n    </div>\n    <details style=\"background:#EAF6EC;border:2px dashed #8FBF98;border-radius:14px;padding:16px 24px;\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n        <span style=\"font-size:24px;font-weight:700;color:#2F6B3D;\"><span style=\"font-family:'Caveat',cursive;font-size:32px;\">Coba Yuk!</span> &nbsp;Tentukan kelas kata: \"She walks slowly through the beautiful garden.\"</span>\n        <span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:24px;padding:9px 18px;border-radius:8px;white-space:nowrap;\">Lihat Jawaban →</span>\n      </summary>\n      <div style=\"margin-top:12px;font-size:24px;line-height:1.5;color:#2C3A2F;\"><strong>walks</strong> = Verb · <strong>slowly</strong> = Adverb · <strong>beautiful</strong> = Adjective · <strong>garden</strong> = Noun · <strong>She</strong> = Pronoun.</div>\n    </details>\n  </div>"},{"label":"Parts of Speech","html":"<div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 60px;\"></div>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"></div>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:14px;\">\n    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;\">\n      <div>\n        <span style=\"display:inline-block;background:#E2574C;color:#fff;font-weight:800;font-size:23px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">TOPIK 01 · WORD</span>\n        <div style=\"display:flex;align-items:baseline;gap:16px;margin-top:8px;\"><h2 style=\"font-size:48px;font-weight:800;margin:0;\">8 Parts of Speech</h2><span style=\"font-family:'Caveat',cursive;font-size:36px;color:#E2574C;\">tabel pembeda kelas kata</span></div>\n      </div>\n      <div style=\"background:#FBE3E1;border-radius:10px;padding:10px 18px;font-size:23px;color:#9A4A42;max-width:430px;line-height:1.35;\">Setiap kata pasti masuk <strong>salah satu</strong> dari 8 jenis ini.</div>\n    </div>\n    <div style=\"background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(60,55,45,0.08);overflow:hidden;flex:1;min-height:0;display:flex;flex-direction:column;\">\n      <div style=\"display:grid;grid-template-columns:1.25fr 1.7fr 1.5fr 2.1fr;background:#E2574C;color:#fff;font-weight:800;font-size:23px;\">\n        <div style=\"padding:11px 18px;\">Jenis</div>\n        <div style=\"padding:11px 14px;border-left:1px solid rgba(255,255,255,0.25);\">Fungsi</div>\n        <div style=\"padding:11px 14px;border-left:1px solid rgba(255,255,255,0.25);\">Contoh kata</div>\n        <div style=\"padding:11px 14px;border-left:1px solid rgba(255,255,255,0.25);\">Contoh dalam kalimat</div>\n      </div>\n      <div style=\"font-size:23px;color:#3D3A33;flex:1;display:flex;flex-direction:column;\">\n        <div style=\"display:grid;grid-template-columns:1.25fr 1.7fr 1.5fr 2.1fr;border-bottom:1px solid #F0EBDF;flex:1;align-items:center;\"><div style=\"padding:8px 18px;font-weight:800;color:#B23A30;\">Noun <span style=\"font-weight:600;color:#8A8377;\">(benda)</span></div><div style=\"padding:8px 14px;\">nama orang, benda, tempat</div><div style=\"padding:8px 14px;\">student, book, Jakarta</div><div style=\"padding:8px 14px;\">The <strong>student</strong> reads.</div></div>\n        <div style=\"display:grid;grid-template-columns:1.25fr 1.7fr 1.5fr 2.1fr;border-bottom:1px solid #F0EBDF;flex:1;align-items:center;background:#FCF6F5;\"><div style=\"padding:8px 18px;font-weight:800;color:#1E7878;\">Pronoun <span style=\"font-weight:600;color:#8A8377;\">(ganti)</span></div><div style=\"padding:8px 14px;\">pengganti kata benda</div><div style=\"padding:8px 14px;\">I, she, they, it</div><div style=\"padding:8px 14px;\"><strong>She</strong> reads it.</div></div>\n        <div style=\"display:grid;grid-template-columns:1.25fr 1.7fr 1.5fr 2.1fr;border-bottom:1px solid #F0EBDF;flex:1;align-items:center;\"><div style=\"padding:8px 18px;font-weight:800;color:#2A66A8;\">Verb <span style=\"font-weight:600;color:#8A8377;\">(kerja)</span></div><div style=\"padding:8px 14px;\">aksi / keadaan</div><div style=\"padding:8px 14px;\">read, run, is</div><div style=\"padding:8px 14px;\">She <strong>reads</strong> daily.</div></div>\n        <div style=\"display:grid;grid-template-columns:1.25fr 1.7fr 1.5fr 2.1fr;border-bottom:1px solid #F0EBDF;flex:1;align-items:center;background:#FCF6F5;\"><div style=\"padding:8px 18px;font-weight:800;color:#9A6B12;\">Adjective <span style=\"font-weight:600;color:#8A8377;\">(sifat)</span></div><div style=\"padding:8px 14px;\">menerangkan benda</div><div style=\"padding:8px 14px;\">smart, big, red</div><div style=\"padding:8px 14px;\">a <strong>smart</strong> student</div></div>\n        <div style=\"display:grid;grid-template-columns:1.25fr 1.7fr 1.5fr 2.1fr;border-bottom:1px solid #F0EBDF;flex:1;align-items:center;\"><div style=\"padding:8px 18px;font-weight:800;color:#357A47;\">Adverb <span style=\"font-weight:600;color:#8A8377;\">(ket.)</span></div><div style=\"padding:8px 14px;\">menerangkan kerja/sifat</div><div style=\"padding:8px 14px;\">quickly, very, well</div><div style=\"padding:8px 14px;\">reads <strong>quickly</strong></div></div>\n        <div style=\"display:grid;grid-template-columns:1.25fr 1.7fr 1.5fr 2.1fr;border-bottom:1px solid #F0EBDF;flex:1;align-items:center;background:#FCF6F5;\"><div style=\"padding:8px 18px;font-weight:800;color:#6B6FD6;\">Preposition <span style=\"font-weight:600;color:#8A8377;\">(depan)</span></div><div style=\"padding:8px 14px;\">tunjuk tempat/waktu/arah</div><div style=\"padding:8px 14px;\">in, on, at, to</div><div style=\"padding:8px 14px;\"><strong>in</strong> the library</div></div>\n        <div style=\"display:grid;grid-template-columns:1.25fr 1.7fr 1.5fr 2.1fr;border-bottom:1px solid #F0EBDF;flex:1;align-items:center;\"><div style=\"padding:8px 18px;font-weight:800;color:#3B82C4;\">Conjunction <span style=\"font-weight:600;color:#8A8377;\">(hubung)</span></div><div style=\"padding:8px 14px;\">menyambung kata/klausa</div><div style=\"padding:8px 14px;\">and, but, because</div><div style=\"padding:8px 14px;\">tea <strong>and</strong> coffee</div></div>\n        <div style=\"display:grid;grid-template-columns:1.25fr 1.7fr 1.5fr 2.1fr;flex:1;align-items:center;background:#FCF6F5;\"><div style=\"padding:8px 18px;font-weight:800;color:#C56A1E;\">Interjection <span style=\"font-weight:600;color:#8A8377;\">(seru)</span></div><div style=\"padding:8px 14px;\">ungkapan perasaan</div><div style=\"padding:8px 14px;\">Wow!, Oh!, Ouch!</div><div style=\"padding:8px 14px;\"><strong>Wow!</strong> It's big.</div></div>\n      </div>\n    </div>\n    <div style=\"background:#FFF3BF;border-radius:8px;padding:11px 24px;box-shadow:0 5px 14px rgba(60,55,45,0.1);transform:rotate(-0.3deg);\"><span style=\"font-family:'Caveat',cursive;font-size:30px;color:#9A6B12;\">Cara Cepat:</span> <span style=\"font-size:23px;color:#5C4A1E;\">empat baris pertama (Noun–Adverb) paling sering muncul; kuasai dulu keempatnya.</span></div>\n  </div>"},{"label":"Pronouns 1","html":"<div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"></div>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"></div>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:16px;\">\n    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;\">\n      <div>\n        <span style=\"display:inline-block;background:#2FA0A0;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">TOPIK 02 · PRONOUNS</span>\n        <div style=\"display:flex;align-items:baseline;gap:18px;margin-top:10px;\"><h2 style=\"font-size:52px;font-weight:800;margin:0;\">Pronouns</h2><span style=\"font-family:'Caveat',cursive;font-size:38px;color:#2FA0A0;\">tabel kata ganti (1/2)</span></div>\n      </div>\n      <div style=\"background:#fff;border:1px solid #ECE6D8;border-radius:12px;padding:12px 20px;box-shadow:0 4px 12px rgba(60,55,45,0.07);max-width:560px;\"><span style=\"font-size:24px;color:#3D3A33;line-height:1.4;\"><strong style=\"color:#2FA0A0;\">Pronoun</strong> menggantikan noun agar tidak diulang. <em>\"Rina reads. <u>She</u> likes it.\"</em></span></div>\n    </div>\n    <div style=\"background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(60,55,45,0.08);overflow:hidden;flex:1;min-height:0;\">\n      <div style=\"display:grid;grid-template-columns:1.15fr 1fr 1fr 1.25fr 1.15fr 1.2fr;background:#2FA0A0;color:#fff;font-weight:800;font-size:22px;\">\n        <div style=\"padding:14px 16px;\">Orang</div>\n        <div style=\"padding:14px 12px;border-left:1px solid rgba(255,255,255,0.25);\">Subject<br><span style=\"font-weight:600;font-size:19px;opacity:0.85;\">(pelaku)</span></div>\n        <div style=\"padding:14px 12px;border-left:1px solid rgba(255,255,255,0.25);\">Object<br><span style=\"font-weight:600;font-size:19px;opacity:0.85;\">(dikenai)</span></div>\n        <div style=\"padding:14px 12px;border-left:1px solid rgba(255,255,255,0.25);\">Possessive Adj<br><span style=\"font-weight:600;font-size:19px;opacity:0.85;\">(+ benda)</span></div>\n        <div style=\"padding:14px 12px;border-left:1px solid rgba(255,255,255,0.25);\">Possessive Pron<br><span style=\"font-weight:600;font-size:19px;opacity:0.85;\">(berdiri sendiri)</span></div>\n        <div style=\"padding:14px 12px;border-left:1px solid rgba(255,255,255,0.25);\">Reflexive<br><span style=\"font-weight:600;font-size:19px;opacity:0.85;\">(diri sendiri)</span></div>\n      </div>\n      <div style=\"font-size:24px;color:#3D3A33;\">\n        <div style=\"display:grid;grid-template-columns:1.15fr 1fr 1fr 1.25fr 1.15fr 1.2fr;border-bottom:1px solid #F0EBDF;background:#fff;\"><div style=\"padding:11px 16px;font-weight:700;\">I (saya)</div><div style=\"padding:11px 12px;font-weight:700;color:#1E7878;\">I</div><div style=\"padding:11px 12px;\">me</div><div style=\"padding:11px 12px;\">my</div><div style=\"padding:11px 12px;\">mine</div><div style=\"padding:11px 12px;\">myself</div></div>\n        <div style=\"display:grid;grid-template-columns:1.15fr 1fr 1fr 1.25fr 1.15fr 1.2fr;border-bottom:1px solid #F0EBDF;background:#F7FBFB;\"><div style=\"padding:11px 16px;font-weight:700;\">You (kamu)</div><div style=\"padding:11px 12px;font-weight:700;color:#1E7878;\">you</div><div style=\"padding:11px 12px;\">you</div><div style=\"padding:11px 12px;\">your</div><div style=\"padding:11px 12px;\">yours</div><div style=\"padding:11px 12px;\">yourself</div></div>\n        <div style=\"display:grid;grid-template-columns:1.15fr 1fr 1fr 1.25fr 1.15fr 1.2fr;border-bottom:1px solid #F0EBDF;background:#fff;\"><div style=\"padding:11px 16px;font-weight:700;\">He (dia ♂)</div><div style=\"padding:11px 12px;font-weight:700;color:#1E7878;\">he</div><div style=\"padding:11px 12px;\">him</div><div style=\"padding:11px 12px;\">his</div><div style=\"padding:11px 12px;\">his</div><div style=\"padding:11px 12px;\">himself</div></div>\n        <div style=\"display:grid;grid-template-columns:1.15fr 1fr 1fr 1.25fr 1.15fr 1.2fr;border-bottom:1px solid #F0EBDF;background:#F7FBFB;\"><div style=\"padding:11px 16px;font-weight:700;\">She (dia ♀)</div><div style=\"padding:11px 12px;font-weight:700;color:#1E7878;\">she</div><div style=\"padding:11px 12px;\">her</div><div style=\"padding:11px 12px;\">her</div><div style=\"padding:11px 12px;\">hers</div><div style=\"padding:11px 12px;\">herself</div></div>\n        <div style=\"display:grid;grid-template-columns:1.15fr 1fr 1fr 1.25fr 1.15fr 1.2fr;border-bottom:1px solid #F0EBDF;background:#fff;\"><div style=\"padding:11px 16px;font-weight:700;\">It (benda)</div><div style=\"padding:11px 12px;font-weight:700;color:#1E7878;\">it</div><div style=\"padding:11px 12px;\">it</div><div style=\"padding:11px 12px;\">its</div><div style=\"padding:11px 12px;\">—</div><div style=\"padding:11px 12px;\">itself</div></div>\n        <div style=\"display:grid;grid-template-columns:1.15fr 1fr 1fr 1.25fr 1.15fr 1.2fr;border-bottom:1px solid #F0EBDF;background:#F7FBFB;\"><div style=\"padding:11px 16px;font-weight:700;\">We (kami)</div><div style=\"padding:11px 12px;font-weight:700;color:#1E7878;\">we</div><div style=\"padding:11px 12px;\">us</div><div style=\"padding:11px 12px;\">our</div><div style=\"padding:11px 12px;\">ours</div><div style=\"padding:11px 12px;\">ourselves</div></div>\n        <div style=\"display:grid;grid-template-columns:1.15fr 1fr 1fr 1.25fr 1.15fr 1.2fr;background:#fff;\"><div style=\"padding:11px 16px;font-weight:700;\">They (mereka)</div><div style=\"padding:11px 12px;font-weight:700;color:#1E7878;\">they</div><div style=\"padding:11px 12px;\">them</div><div style=\"padding:11px 12px;\">their</div><div style=\"padding:11px 12px;\">theirs</div><div style=\"padding:11px 12px;\">themselves</div></div>\n      </div>\n    </div>\n    <div style=\"display:flex;gap:16px;\">\n      <div style=\"flex:1;background:#FFF3BF;border-radius:8px;padding:12px 22px;box-shadow:0 5px 14px rgba(60,55,45,0.1);transform:rotate(-0.4deg);\"><span style=\"font-family:'Caveat',cursive;font-size:30px;color:#9A6B12;\">Cara Cepat:</span> <span style=\"font-size:24px;color:#5C4A1E;\"><strong>my</strong> + benda (\"my book\"), tapi <strong>mine</strong> berdiri sendiri (\"It's mine\").</span></div>\n      <div style=\"flex:1;background:#E0F1F1;border-radius:8px;padding:12px 22px;\"><span style=\"font-size:24px;color:#1E5E5E;\"><strong>Contoh:</strong> \"She did it <strong>herself</strong>.\" → reflexive, aksi kembali ke pelaku.</span></div>\n    </div>\n  </div>"},{"label":"Pronouns 2","html":"<div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"></div>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"></div>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:18px;\">\n    <div>\n      <span style=\"display:inline-block;background:#2FA0A0;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">TOPIK 02 · PRONOUNS</span>\n      <div style=\"display:flex;align-items:baseline;gap:18px;margin-top:10px;\"><h2 style=\"font-size:52px;font-weight:800;margin:0;\">Jenis Pronoun Lainnya</h2><span style=\"font-family:'Caveat',cursive;font-size:38px;color:#2FA0A0;\">(2/2)</span></div>\n    </div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;flex:1;min-height:0;\">\n      <div style=\"background:#fff;border-radius:14px;padding:22px 26px;box-shadow:0 6px 18px rgba(60,55,45,0.08);border-top:5px solid #2A66A8;display:flex;flex-direction:column;\">\n        <div style=\"font-size:26px;font-weight:800;color:#2A66A8;\">Relative Pronoun</div>\n        <div style=\"font-size:24px;color:#7A746A;margin:2px 0 10px;\">Menyambung keterangan ke kata benda</div>\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;\"><span style=\"background:#DCEAF6;color:#2A66A8;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">who</span><span style=\"background:#DCEAF6;color:#2A66A8;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">whom</span><span style=\"background:#DCEAF6;color:#2A66A8;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">which</span><span style=\"background:#DCEAF6;color:#2A66A8;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">that</span><span style=\"background:#DCEAF6;color:#2A66A8;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">whose</span></div>\n        <div style=\"margin-top:auto;font-size:24px;background:#F4F8FC;border-radius:8px;padding:10px 14px;color:#3D3A33;\">\"The boy <strong>who</strong> won is my friend.\" <span style=\"color:#8A8377;font-style:italic;\">— anak laki-laki yang menang…</span></div>\n      </div>\n      <div style=\"background:#fff;border-radius:14px;padding:22px 26px;box-shadow:0 6px 18px rgba(60,55,45,0.08);border-top:5px solid #B23A30;display:flex;flex-direction:column;\">\n        <div style=\"font-size:26px;font-weight:800;color:#B23A30;\">Demonstrative Pronoun</div>\n        <div style=\"font-size:24px;color:#7A746A;margin:2px 0 10px;\">Menunjuk benda (dekat / jauh)</div>\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;\"><span style=\"background:#FBE3E1;color:#B23A30;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">this</span><span style=\"background:#FBE3E1;color:#B23A30;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">that</span><span style=\"background:#FBE3E1;color:#B23A30;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">these</span><span style=\"background:#FBE3E1;color:#B23A30;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">those</span></div>\n        <div style=\"margin-top:auto;font-size:24px;background:#FCF4F3;border-radius:8px;padding:10px 14px;color:#3D3A33;\">\"<strong>This</strong> is my book; <strong>those</strong> are yours.\" <span style=\"color:#8A8377;font-style:italic;\">— ini… itu…</span></div>\n      </div>\n      <div style=\"background:#fff;border-radius:14px;padding:22px 26px;box-shadow:0 6px 18px rgba(60,55,45,0.08);border-top:5px solid #9A6B12;display:flex;flex-direction:column;\">\n        <div style=\"font-size:26px;font-weight:800;color:#9A6B12;\">Interrogative Pronoun</div>\n        <div style=\"font-size:24px;color:#7A746A;margin:2px 0 10px;\">Untuk bertanya</div>\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;\"><span style=\"background:#FBF0D6;color:#9A6B12;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">who</span><span style=\"background:#FBF0D6;color:#9A6B12;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">what</span><span style=\"background:#FBF0D6;color:#9A6B12;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">which</span><span style=\"background:#FBF0D6;color:#9A6B12;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">whose</span></div>\n        <div style=\"margin-top:auto;font-size:24px;background:#FBF7EC;border-radius:8px;padding:10px 14px;color:#3D3A33;\">\"<strong>What</strong> do you want?\" <span style=\"color:#8A8377;font-style:italic;\">— apa yang kamu mau?</span></div>\n      </div>\n      <div style=\"background:#fff;border-radius:14px;padding:22px 26px;box-shadow:0 6px 18px rgba(60,55,45,0.08);border-top:5px solid #357A47;display:flex;flex-direction:column;\">\n        <div style=\"font-size:26px;font-weight:800;color:#357A47;\">Indefinite Pronoun</div>\n        <div style=\"font-size:24px;color:#7A746A;margin:2px 0 10px;\">Menunjuk yang tidak spesifik</div>\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;\"><span style=\"background:#DDF0E1;color:#357A47;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">someone</span><span style=\"background:#DDF0E1;color:#357A47;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">anything</span><span style=\"background:#DDF0E1;color:#357A47;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">everybody</span><span style=\"background:#DDF0E1;color:#357A47;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">nothing</span></div>\n        <div style=\"margin-top:auto;font-size:24px;background:#F4FAF5;border-radius:8px;padding:10px 14px;color:#3D3A33;\">\"<strong>Someone</strong> is knocking.\" <span style=\"color:#8A8377;font-style:italic;\">— seseorang sedang mengetuk.</span></div>\n      </div>\n    </div>\n    <details style=\"background:#EAF6EC;border:2px dashed #8FBF98;border-radius:14px;padding:14px 24px;\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n        <span style=\"font-size:24px;font-weight:700;color:#2F6B3D;\"><span style=\"font-family:'Caveat',cursive;font-size:32px;\">Coba Yuk!</span> &nbsp;Pilih pronoun tepat: \"The phone ___ rang is mine.\" (who / which)</span>\n        <span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:24px;padding:9px 18px;border-radius:8px;white-space:nowrap;\">Lihat Jawaban →</span>\n      </summary>\n      <div style=\"margin-top:10px;font-size:24px;line-height:1.5;color:#2C3A2F;\"><strong>which</strong> — untuk benda. \"who\" hanya untuk orang.</div>\n    </details>\n  </div>"},{"label":"Conjunction","html":"<div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"></div>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"></div>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:16px;\">\n    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;\">\n      <div>\n        <span style=\"display:inline-block;background:#3B82C4;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">TOPIK 03 · CONJUNCTION</span>\n        <div style=\"display:flex;align-items:baseline;gap:18px;margin-top:10px;\"><h2 style=\"font-size:52px;font-weight:800;margin:0;\">Conjunction</h2><span style=\"font-family:'Caveat',cursive;font-size:38px;color:#3B82C4;\">kata hubung (1/2)</span></div>\n      </div>\n      <div style=\"background:#fff;border:1px solid #ECE6D8;border-radius:12px;padding:12px 20px;box-shadow:0 4px 12px rgba(60,55,45,0.07);max-width:640px;\"><span style=\"font-size:24px;color:#3D3A33;line-height:1.4;\"><strong style=\"color:#3B82C4;\">Conjunction</strong> menyambung kata, frasa, atau klausa. Ada <strong>3 jenis</strong>: Coordinating, Subordinating, &amp; Correlative.</span></div>\n    </div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;flex:1;min-height:0;\">\n      <div style=\"background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(60,55,45,0.08);overflow:hidden;display:flex;flex-direction:column;\">\n        <div style=\"background:#DCEAF6;padding:14px 22px;\"><div style=\"font-size:26px;font-weight:800;color:#2A66A8;\">Coordinating</div><div style=\"font-size:22px;color:#3B6FA0;\">menghubungkan elemen <strong>setara</strong></div></div>\n        <div style=\"padding:14px 22px;border-bottom:1px solid #F0EBDF;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center;\"><span style=\"background:#2A66A8;color:#fff;font-weight:800;font-size:22px;padding:6px 12px;border-radius:8px;\">for</span><span style=\"font-size:24px;color:#3D3A33;\">sebab — \"…, <strong>for</strong> it was late.\"</span></div>\n        <div style=\"padding:14px 22px;border-bottom:1px solid #F0EBDF;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center;\"><span style=\"background:#2A66A8;color:#fff;font-weight:800;font-size:22px;padding:6px 12px;border-radius:8px;\">and</span><span style=\"font-size:24px;color:#3D3A33;\">menambah — \"tea <strong>and</strong> coffee\"</span></div>\n        <div style=\"padding:14px 22px;border-bottom:1px solid #F0EBDF;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center;\"><span style=\"background:#2A66A8;color:#fff;font-weight:800;font-size:22px;padding:6px 12px;border-radius:8px;\">but</span><span style=\"font-size:24px;color:#3D3A33;\">kontras — \"cheap <strong>but</strong> good\"</span></div>\n        <div style=\"padding:14px 22px;border-bottom:1px solid #F0EBDF;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center;\"><span style=\"background:#2A66A8;color:#fff;font-weight:800;font-size:22px;padding:6px 12px;border-radius:8px;\">or</span><span style=\"font-size:24px;color:#3D3A33;\">pilihan — \"tea <strong>or</strong> coffee?\"</span></div>\n        <div style=\"padding:14px 22px;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center;\"><span style=\"background:#2A66A8;color:#fff;font-weight:800;font-size:22px;padding:6px 12px;border-radius:8px;\">so</span><span style=\"font-size:24px;color:#3D3A33;\">akibat — \"Late, <strong>so</strong> we ran.\"</span></div>\n        <div style=\"margin-top:auto;background:#EAF2FB;padding:12px 22px;\"><span style=\"font-family:'Caveat',cursive;font-size:30px;color:#2A66A8;\">Ingat:</span> <span style=\"font-size:24px;color:#274660;font-weight:700;\">FANBOYS</span> <span style=\"font-size:22px;color:#3B6FA0;\">= for, and, nor, but, or, yet, so</span></div>\n      </div>\n      <div style=\"background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(60,55,45,0.08);overflow:hidden;display:flex;flex-direction:column;\">\n        <div style=\"background:#FBE3E1;padding:14px 22px;\"><div style=\"font-size:26px;font-weight:800;color:#B23A30;\">Subordinating</div><div style=\"font-size:22px;color:#9A4A42;\">membuat <strong>anak kalimat</strong> (dependent)</div></div>\n        <div style=\"padding:14px 22px;border-bottom:1px solid #F0EBDF;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center;\"><span style=\"background:#B23A30;color:#fff;font-weight:800;font-size:22px;padding:6px 12px;border-radius:8px;\">because</span><span style=\"font-size:24px;color:#3D3A33;\">sebab — \"…<strong>because</strong> I was tired.\"</span></div>\n        <div style=\"padding:14px 22px;border-bottom:1px solid #F0EBDF;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center;\"><span style=\"background:#B23A30;color:#fff;font-weight:800;font-size:22px;padding:6px 12px;border-radius:8px;\">when</span><span style=\"font-size:24px;color:#3D3A33;\">waktu — \"<strong>when</strong> she arrived…\"</span></div>\n        <div style=\"padding:14px 22px;border-bottom:1px solid #F0EBDF;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center;\"><span style=\"background:#B23A30;color:#fff;font-weight:800;font-size:22px;padding:6px 12px;border-radius:8px;\">if</span><span style=\"font-size:24px;color:#3D3A33;\">syarat — \"<strong>if</strong> you study…\"</span></div>\n        <div style=\"padding:14px 22px;border-bottom:1px solid #F0EBDF;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center;\"><span style=\"background:#B23A30;color:#fff;font-weight:800;font-size:22px;padding:6px 12px;border-radius:8px;\">although</span><span style=\"font-size:24px;color:#3D3A33;\">meski — \"<strong>although</strong> it rained…\"</span></div>\n        <div style=\"padding:14px 22px;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center;\"><span style=\"background:#B23A30;color:#fff;font-weight:800;font-size:22px;padding:6px 12px;border-radius:8px;\">while</span><span style=\"font-size:24px;color:#3D3A33;\">sementara — \"<strong>while</strong> he slept…\"</span></div>\n        <div style=\"margin-top:auto;background:#FCEEEC;padding:12px 22px;\"><span style=\"font-family:'Caveat',cursive;font-size:30px;color:#B23A30;\">Catatan:</span> <span style=\"font-size:22px;color:#7F2A22;\">anak kalimat ini selalu butuh induk kalimat.</span></div>\n      </div>\n    </div>\n    <details style=\"background:#EAF6EC;border:2px dashed #8FBF98;border-radius:14px;padding:14px 24px;\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n        <span style=\"font-size:24px;font-weight:700;color:#2F6B3D;\"><span style=\"font-family:'Caveat',cursive;font-size:32px;\">Coba Yuk!</span> &nbsp;Pilih: \"I stayed home ___ it was raining.\" (but / because)</span>\n        <span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:24px;padding:9px 18px;border-radius:8px;white-space:nowrap;\">Lihat Jawaban →</span>\n      </summary>\n      <div style=\"margin-top:10px;font-size:24px;line-height:1.5;color:#2C3A2F;\"><strong>because</strong> — menyatakan sebab (alasan tinggal di rumah).</div>\n    </details>\n  </div>"},{"label":"Correlative","html":"<div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 60px;\"></div>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"></div>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:14px;\">\n    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;\">\n      <div>\n        <span style=\"display:inline-block;background:#3B82C4;color:#fff;font-weight:800;font-size:23px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">TOPIK 03 · CONJUNCTION</span>\n        <div style=\"display:flex;align-items:baseline;gap:16px;margin-top:8px;\"><h2 style=\"font-size:48px;font-weight:800;margin:0;\">Correlative Conjunction</h2><span style=\"font-family:'Caveat',cursive;font-size:36px;color:#3B82C4;\">pasangan kata hubung (2/2)</span></div>\n      </div>\n      <div style=\"background:#DCEAF6;border-radius:10px;padding:10px 18px;font-size:23px;color:#1F4E80;max-width:430px;line-height:1.35;\">Selalu <strong>berpasangan</strong> &amp; menghubungkan dua bagian <strong>setara</strong>.</div>\n    </div>\n    <div style=\"background:#fff;border-radius:14px;box-shadow:0 6px 18px rgba(60,55,45,0.08);overflow:hidden;flex:1;min-height:0;display:flex;flex-direction:column;\">\n      <div style=\"display:grid;grid-template-columns:1.3fr 1.2fr 2.2fr;background:#3B82C4;color:#fff;font-weight:800;font-size:23px;\">\n        <div style=\"padding:11px 18px;\">Pasangan</div>\n        <div style=\"padding:11px 14px;border-left:1px solid rgba(255,255,255,0.25);\">Makna</div>\n        <div style=\"padding:11px 14px;border-left:1px solid rgba(255,255,255,0.25);\">Contoh kalimat</div>\n      </div>\n      <div style=\"font-size:24px;color:#3D3A33;flex:1;display:flex;flex-direction:column;\">\n        <div style=\"display:grid;grid-template-columns:1.3fr 1.2fr 2.2fr;border-bottom:1px solid #F0EBDF;flex:1;align-items:center;\"><div style=\"padding:8px 18px;\"><strong style=\"color:#2A66A8;\">both … and</strong></div><div style=\"padding:8px 14px;\">keduanya</div><div style=\"padding:8px 14px;\"><strong>Both</strong> Rina <strong>and</strong> Tom passed.</div></div>\n        <div style=\"display:grid;grid-template-columns:1.3fr 1.2fr 2.2fr;border-bottom:1px solid #F0EBDF;flex:1;align-items:center;background:#F4F8FC;\"><div style=\"padding:8px 18px;\"><strong style=\"color:#2A66A8;\">either … or</strong></div><div style=\"padding:8px 14px;\">salah satu</div><div style=\"padding:8px 14px;\">You may take <strong>either</strong> tea <strong>or</strong> coffee.</div></div>\n        <div style=\"display:grid;grid-template-columns:1.3fr 1.2fr 2.2fr;border-bottom:1px solid #F0EBDF;flex:1;align-items:center;\"><div style=\"padding:8px 18px;\"><strong style=\"color:#2A66A8;\">neither … nor</strong></div><div style=\"padding:8px 14px;\">tidak keduanya</div><div style=\"padding:8px 14px;\"><strong>Neither</strong> he <strong>nor</strong> she came.</div></div>\n        <div style=\"display:grid;grid-template-columns:1.3fr 1.2fr 2.2fr;border-bottom:1px solid #F0EBDF;flex:1;align-items:center;background:#F4F8FC;\"><div style=\"padding:8px 18px;\"><strong style=\"color:#2A66A8;\">not only … but also</strong></div><div style=\"padding:8px 14px;\">bukan hanya…</div><div style=\"padding:8px 14px;\"><strong>Not only</strong> smart <strong>but also</strong> kind.</div></div>\n        <div style=\"display:grid;grid-template-columns:1.3fr 1.2fr 2.2fr;flex:1;align-items:center;\"><div style=\"padding:8px 18px;\"><strong style=\"color:#2A66A8;\">whether … or</strong></div><div style=\"padding:8px 14px;\">apakah…atau</div><div style=\"padding:8px 14px;\">Decide <strong>whether</strong> to stay <strong>or</strong> go.</div></div>\n      </div>\n    </div>\n    <details style=\"background:#EAF6EC;border:2px dashed #8FBF98;border-radius:14px;padding:14px 24px;\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n        <span style=\"font-size:24px;font-weight:700;color:#2F6B3D;\"><span style=\"font-family:'Caveat',cursive;font-size:32px;\">Coba Yuk!</span> &nbsp;Lengkapi: \"She speaks ___ English ___ French.\" (kedua bahasa)</span>\n        <span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:24px;padding:9px 18px;border-radius:8px;white-space:nowrap;\">Lihat Jawaban →</span>\n      </summary>\n      <div style=\"margin-top:10px;font-size:24px;line-height:1.5;color:#2C3A2F;\">\"She speaks <strong>both</strong> English <strong>and</strong> French.\" → pasangan <strong>both … and</strong>.</div>\n    </details>\n  </div>"},{"label":"Phrase","html":"<div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"></div>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"></div>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:18px;\">\n    <div>\n      <span style=\"display:inline-block;background:#E8833A;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">TOPIK 04 · PHRASE</span>\n      <div style=\"display:flex;align-items:baseline;gap:18px;margin-top:10px;\"><h2 style=\"font-size:52px;font-weight:800;margin:0;\">Phrase</h2><span style=\"font-family:'Caveat',cursive;font-size:38px;color:#E8833A;\">kelompok kata (1/2)</span></div>\n    </div>\n    <div style=\"display:grid;grid-template-columns:1.05fr 1fr;gap:26px;flex:1;min-height:0;\">\n      <div style=\"display:flex;flex-direction:column;gap:16px;\">\n        <div style=\"background:#fff;border-top:5px solid #E8833A;border-radius:14px;padding:20px 24px;box-shadow:0 6px 18px rgba(60,55,45,0.08);\">\n          <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#E8833A;margin-bottom:8px;\">APA ITU PHRASE?</div>\n          <p style=\"font-size:25px;line-height:1.45;margin:0;color:#3D3A33;\"><strong>Phrase</strong> = sekelompok kata yang menyatu jadi satu makna, tapi <strong>belum</strong> punya pasangan <em>subjek + kata kerja</em>. Karena itu phrase <strong>belum bisa berdiri sendiri</strong> sebagai kalimat — ia hanya <strong>potongan</strong> yang dipakai untuk membangun kalimat.</p>\n        </div>\n        <div style=\"background:#FBEFE3;border-radius:12px;padding:16px 22px;border-left:6px solid #E8833A;\">\n          <div style=\"font-size:24px;font-weight:800;color:#C56A1E;margin-bottom:2px;\">Inti yang perlu diingat</div>\n          <p style=\"font-size:24px;line-height:1.4;margin:0;color:#5C4A40;\">Nama tiap phrase diambil dari <strong>kata intinya</strong>. Panah <strong>(↑)</strong> pada contoh menunjuk inti tiap frasa. Phrase = <strong>potongan</strong>, bukan kalimat utuh.</p>\n        </div>\n        <div style=\"background:#fff;border:1px solid #ECE6D8;border-radius:14px;padding:18px 24px;box-shadow:0 6px 18px rgba(60,55,45,0.08);\">\n          <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#7A746A;margin-bottom:10px;\">CONTOH DALAM KALIMAT</div>\n          <div style=\"display:flex;flex-wrap:wrap;align-items:flex-start;gap:8px 10px;font-size:25px;font-weight:600;\">\n            <div style=\"text-align:center;\"><div style=\"background:#FBE3E1;color:#B23A30;padding:2px 8px;border-radius:5px;\">The intelligent student</div><div style=\"font-size:20px;color:#B23A30;margin-top:2px;\">↑ Noun Phrase</div></div>\n            <div style=\"text-align:center;\"><div style=\"background:#DCEAF6;color:#2A66A8;padding:2px 8px;border-radius:5px;\">in the library</div><div style=\"font-size:20px;color:#2A66A8;margin-top:2px;\">↑ Prepositional</div></div>\n            <div style=\"text-align:center;\"><div style=\"padding:2px 4px;color:#3D3A33;\">reads</div></div>\n            <div style=\"text-align:center;\"><div style=\"background:#DDF0E1;color:#357A47;padding:2px 8px;border-radius:5px;\">very carefully</div><div style=\"font-size:20px;color:#357A47;margin-top:2px;\">↑ Adverbial</div></div>\n          </div>\n          <p style=\"font-size:24px;font-style:italic;color:#8A8377;margin:10px 0 0;\">\"Murid cerdas di perpustakaan membaca dengan sangat hati-hati.\"</p>\n        </div>\n      </div>\n      <div style=\"display:flex;flex-direction:column;gap:12px;\">\n        <div style=\"background:#FBE3E1;border-radius:12px;padding:16px 20px;border-left:6px solid #B23A30;\">\n          <div style=\"font-size:24px;font-weight:800;color:#B23A30;\">Noun Phrase <span style=\"font-weight:600;font-size:21px;color:#9A4A42;\">— frasa benda</span></div>\n          <div style=\"font-size:24px;color:#5C4A40;line-height:1.4;margin-top:3px;\">Inti katanya <strong>kata benda</strong>. Berfungsi seperti benda (subjek/objek).<br><strong>\"the intelligent student\"</strong> → murid yang cerdas</div>\n        </div>\n        <div style=\"background:#DCEAF6;border-radius:12px;padding:16px 20px;border-left:6px solid #2A66A8;\">\n          <div style=\"font-size:24px;font-weight:800;color:#2A66A8;\">Prepositional Phrase <span style=\"font-weight:600;font-size:21px;color:#3B6FA0;\">— frasa kata depan</span></div>\n          <div style=\"font-size:24px;color:#274660;line-height:1.4;margin-top:3px;\">Diawali <strong>kata depan</strong> (in, on, at, with...). Menjelaskan tempat/waktu/cara.<br><strong>\"in the library\"</strong> → di perpustakaan</div>\n        </div>\n        <div style=\"background:#DDF0E1;border-radius:12px;padding:16px 20px;border-left:6px solid #357A47;\">\n          <div style=\"font-size:24px;font-weight:800;color:#357A47;\">Adverbial Phrase <span style=\"font-weight:600;font-size:21px;color:#46805A;\">— frasa keterangan</span></div>\n          <div style=\"font-size:24px;color:#2C4A38;line-height:1.4;margin-top:3px;\">Memberi <strong>keterangan</strong> pada kata kerja: bagaimana/kapan.<br><strong>\"very carefully\"</strong> → dengan sangat hati-hati</div>\n        </div>\n        <div style=\"background:#33302A;border-radius:12px;padding:14px 20px;color:#FBF7EE;\">\n          <div style=\"font-size:22px;line-height:1.4;\"><span style=\"font-family:'Caveat',cursive;font-size:30px;color:#F0C98A;\">Hubungannya:</span> ketiga frasa di atas adalah <strong>balok-balok</strong> yang dirangkai jadi satu kalimat utuh.</div>\n        </div>\n      </div>\n    </div>\n    <details style=\"background:#EAF6EC;border:2px dashed #8FBF98;border-radius:14px;padding:14px 24px;\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n        <span style=\"font-size:24px;font-weight:700;color:#2F6B3D;\"><span style=\"font-family:'Caveat',cursive;font-size:32px;\">Coba Yuk!</span> &nbsp;Tentukan jenis frasa: \"The tall boy / on the stage / sang beautifully.\"</span>\n        <span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:24px;padding:9px 18px;border-radius:8px;white-space:nowrap;\">Lihat Jawaban →</span>\n      </summary>\n      <div style=\"margin-top:10px;font-size:24px;line-height:1.5;color:#2C3A2F;\"><strong>The tall boy</strong> = Noun Phrase · <strong>on the stage</strong> = Prepositional Phrase · <strong>beautifully</strong> (adverb) sebagai Adverbial.</div>\n    </details>\n  </div>"},{"label":"Phrase 2","html":"<div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"></div>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"></div>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:18px;\">\n    <div>\n      <span style=\"display:inline-block;background:#E8833A;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">TOPIK 04 · PHRASE</span>\n      <div style=\"display:flex;align-items:baseline;gap:18px;margin-top:10px;\"><h2 style=\"font-size:52px;font-weight:800;margin:0;\">Verb &amp; Adjective Phrase</h2><span style=\"font-family:'Caveat',cursive;font-size:38px;color:#E8833A;\">(2/2)</span></div>\n    </div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px;\">\n      <div style=\"background:#fff;border-radius:14px;padding:22px 26px;box-shadow:0 6px 18px rgba(60,55,45,0.08);border-top:5px solid #2A66A8;\">\n        <div style=\"font-size:27px;font-weight:800;color:#2A66A8;\">Verb Phrase <span style=\"font-weight:600;font-size:22px;color:#3B6FA0;\">— frasa kerja</span></div>\n        <p style=\"font-size:24px;line-height:1.4;margin:6px 0 10px;color:#3D3A33;\">Kata kerja utama + <strong>kata bantu</strong> (will, has, is...). Berfungsi sebagai <strong>predikat</strong> (bagian \"melakukan apa\").</p>\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px;\"><span style=\"background:#DCEAF6;color:#2A66A8;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">will read</span><span style=\"background:#DCEAF6;color:#2A66A8;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">has finished</span><span style=\"background:#DCEAF6;color:#2A66A8;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">is studying</span></div>\n      </div>\n      <div style=\"background:#fff;border-radius:14px;padding:22px 26px;box-shadow:0 6px 18px rgba(60,55,45,0.08);border-top:5px solid #9A6B12;\">\n        <div style=\"font-size:27px;font-weight:800;color:#9A6B12;\">Adjective Phrase <span style=\"font-weight:600;font-size:22px;color:#A87E2E;\">— frasa sifat</span></div>\n        <p style=\"font-size:24px;line-height:1.4;margin:6px 0 10px;color:#3D3A33;\">Kata sifat + <strong>penguat</strong> (very, quite, extremely...). Menerangkan <strong>kata benda</strong>.</p>\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px;\"><span style=\"background:#FBF0D6;color:#9A6B12;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">very diligent</span><span style=\"background:#FBF0D6;color:#9A6B12;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">extremely tall</span><span style=\"background:#FBF0D6;color:#9A6B12;font-weight:700;font-size:24px;padding:5px 12px;border-radius:18px;\">quite easy</span></div>\n      </div>\n    </div>\n    <div style=\"background:#fff;border:1px solid #ECE6D8;border-radius:14px;padding:20px 26px;box-shadow:0 6px 18px rgba(60,55,45,0.08);flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;\">\n      <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#7A746A;margin-bottom:14px;\">CONTOH GABUNGAN — semua frasa dalam satu kalimat</div>\n      <div style=\"display:flex;flex-wrap:wrap;align-items:flex-start;gap:12px 14px;font-size:28px;font-weight:600;\">\n        <div style=\"text-align:center;\"><div style=\"background:#FBE3E1;color:#B23A30;padding:3px 10px;border-radius:6px;\">The <span style=\"background:#FBF0D6;color:#9A6B12;padding:1px 5px;border-radius:4px;\">extremely tall</span> player</div><div style=\"font-size:21px;color:#B23A30;margin-top:4px;\">↑ Noun Phrase <span style=\"color:#9A6B12;\">(berisi Adjective Phrase)</span></div></div>\n        <div style=\"text-align:center;\"><div style=\"background:#DCEAF6;color:#2A66A8;padding:3px 10px;border-radius:6px;\">will score</div><div style=\"font-size:21px;color:#2A66A8;margin-top:4px;\">↑ Verb Phrase</div></div>\n        <div style=\"text-align:center;\"><div style=\"background:#DDF0E1;color:#357A47;padding:3px 10px;border-radius:6px;\">very easily</div><div style=\"font-size:21px;color:#357A47;margin-top:4px;\">↑ Adverbial Phrase</div></div>\n      </div>\n      <p style=\"font-size:24px;font-style:italic;color:#8A8377;margin:14px 0 0;\">\"Pemain yang sangat tinggi itu akan mencetak skor dengan sangat mudah.\"</p>\n    </div>\n    <details style=\"background:#EAF6EC;border:2px dashed #8FBF98;border-radius:14px;padding:14px 24px;\">\n      <summary style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n        <span style=\"font-size:24px;font-weight:700;color:#2F6B3D;\"><span style=\"font-family:'Caveat',cursive;font-size:32px;\">Coba Yuk!</span> &nbsp;Sebutkan jenis frasa: \"has been waiting\" dan \"very happy\".</span>\n        <span class=\"rv-btn\" style=\"flex:none;background:#4FA15B;color:#fff;font-weight:800;font-size:24px;padding:9px 18px;border-radius:8px;white-space:nowrap;\">Lihat Jawaban →</span>\n      </summary>\n      <div style=\"margin-top:10px;font-size:24px;line-height:1.5;color:#2C3A2F;\"><strong>has been waiting</strong> = Verb Phrase (kata kerja + bantu) · <strong>very happy</strong> = Adjective Phrase (penguat + sifat).</div>\n    </details>\n  </div>"},{"label":"Adjective Order","html":"<div style=\"position:absolute;left:40px;top:0;width:26px;height:100%;background-image:radial-gradient(circle at center,rgba(60,55,45,0.14) 6.5px,rgba(60,55,45,0.05) 7.5px,transparent 8.5px);background-size:26px 128px;background-repeat:repeat-y;background-position:center 64px;\"></div>\n  <div style=\"position:absolute;left:120px;top:0;width:2px;height:100%;background:#E0A39C;\"></div>\n  <div style=\"display:flex;flex-direction:column;height:100%;gap:18px;\">\n    <div>\n      <span style=\"display:inline-block;background:#6B6FD6;color:#fff;font-weight:800;font-size:24px;letter-spacing:2px;padding:6px 16px;border-radius:8px;transform:rotate(-1.2deg);box-shadow:0 3px 10px rgba(0,0,0,0.13);\">TOPIK 05 · ADJECTIVE ORDER</span>\n      <div style=\"display:flex;align-items:baseline;gap:18px;margin-top:10px;\"><h2 style=\"font-size:52px;font-weight:800;margin:0;\">Adjective Order</h2><span style=\"font-family:'Caveat',cursive;font-size:38px;color:#6B6FD6;\">urutan kata sifat</span></div>\n    </div>\n    <div style=\"display:grid;grid-template-columns:1fr 1.05fr;gap:26px;flex:1;min-height:0;\">\n      <div style=\"display:flex;flex-direction:column;gap:14px;\">\n        <div style=\"background:#fff;border-top:5px solid #6B6FD6;border-radius:14px;padding:18px 24px;box-shadow:0 6px 18px rgba(60,55,45,0.08);\">\n          <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#6B6FD6;margin-bottom:6px;\">APA INI?</div>\n          <p style=\"font-size:24px;line-height:1.45;margin:0;color:#3D3A33;\">Jika ada <strong>beberapa kata sifat</strong> sebelum benda, urutannya <strong>tidak acak</strong>. Ada urutan baku yang disingkat <strong>OSASCOMP</strong>.</p>\n        </div>\n        <div style=\"background:#fff;border:1px solid #ECE6D8;border-radius:14px;padding:14px 20px;box-shadow:0 6px 18px rgba(60,55,45,0.08);display:flex;flex-direction:column;gap:7px;\">\n          <div style=\"display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:center;\"><span style=\"background:#6B6FD6;color:#fff;font-weight:800;font-size:21px;padding:4px 11px;border-radius:7px;width:42px;text-align:center;\">O</span><span style=\"font-size:22px;color:#3D3A33;\"><strong>Opinion</strong> — pendapat (beautiful, nice)</span></div>\n          <div style=\"display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:center;\"><span style=\"background:#6B6FD6;color:#fff;font-weight:800;font-size:21px;padding:4px 11px;border-radius:7px;width:42px;text-align:center;\">S</span><span style=\"font-size:22px;color:#3D3A33;\"><strong>Size</strong> — ukuran (big, small)</span></div>\n          <div style=\"display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:center;\"><span style=\"background:#6B6FD6;color:#fff;font-weight:800;font-size:21px;padding:4px 11px;border-radius:7px;width:42px;text-align:center;\">A</span><span style=\"font-size:22px;color:#3D3A33;\"><strong>Age</strong> — usia (old, new)</span></div>\n          <div style=\"display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:center;\"><span style=\"background:#6B6FD6;color:#fff;font-weight:800;font-size:21px;padding:4px 11px;border-radius:7px;width:42px;text-align:center;\">S</span><span style=\"font-size:22px;color:#3D3A33;\"><strong>Shape</strong> — bentuk (round, square)</span></div>\n          <div style=\"display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:center;\"><span style=\"background:#6B6FD6;color:#fff;font-weight:800;font-size:21px;padding:4px 11px;border-radius:7px;width:42px;text-align:center;\">C</span><span style=\"font-size:22px;color:#3D3A33;\"><strong>Color</strong> — warna (red, blue)</span></div>\n          <div style=\"display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:center;\"><span style=\"background:#6B6FD6;color:#fff;font-weight:800;font-size:21px;padding:4px 11px;border-radius:7px;width:42px;text-align:center;\">O</span><span style=\"font-size:22px;color:#3D3A33;\"><strong>Origin</strong> — asal (Italian, Japanese)</span></div>\n          <div style=\"display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:center;\"><span style=\"background:#6B6FD6;color:#fff;font-weight:800;font-size:21px;padding:4px 11px;border-radius:7px;width:42px;text-align:center;\">M</span><span style=\"font-size:22px;color:#3D3A33;\"><strong>Material</strong> — bahan (wooden, plastic)</span></div>\n          <div style=\"display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:center;\"><span style=\"background:#6B6FD6;color:#fff;font-weight:800;font-size:21px;padding:4px 11px;border-radius:7px;width:42px;text-align:center;\">P</span><span style=\"font-size:22px;color:#3D3A33;\"><strong>Purpose</strong> — kegunaan (dining, sleeping)</span></div>\n        </div>\n      </div>\n      <div style=\"display:flex;flex-direction:column;gap:14px;\">\n        <div style=\"background:#FFF3BF;border-radius:8px;padding:16px 22px;box-shadow:0 6px 16px rgba(60,55,45,0.12);transform:rotate(0.8deg);\">\n          <div style=\"font-family:'Caveat',cursive;font-size:34px;font-weight:700;color:#9A6B12;\">Cara Cepat</div>\n          <p style=\"font-size:24px;line-height:1.4;margin:2px 0 0;color:#5C4A1E;\">Hafalkan <strong>O-S-A-S-C-O-M-P</strong>. Pendapat selalu di depan, bahan &amp; kegunaan paling dekat dengan benda.</p>\n        </div>\n        <div style=\"background:#fff;border:1px solid #ECE6D8;border-radius:14px;padding:18px 22px;box-shadow:0 6px 18px rgba(60,55,45,0.08);\">\n          <div style=\"font-size:24px;font-weight:800;letter-spacing:2px;color:#357A47;margin-bottom:10px;\">✓ CONTOH BENAR</div>\n          <di
